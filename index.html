<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Repérage Pro">
<meta name="theme-color" content="#e05c14">
<title>Repérage Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#161616;--card2:#1e1e1e;--border:#2a2a2a;--border2:#383838;--text:#ede9e0;--text2:#9a9590;--text3:#5a5650;--orange:#e05c14;--red:#c0392b;--green:#1e8a4a;--blue:#1a5fa0;--purple:#7c3aed;--purplebg:rgba(124,58,237,0.12)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;display:flex;flex-direction:column}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:0 12px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--text);display:flex;align-items:center;gap:8px;cursor:pointer}
.logo span{color:var(--orange)}
.hbtns{display:flex;gap:5px}
.hbtn{background:var(--orange);color:white;border:none;padding:6px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:opacity .15s}
.hbtn:active{opacity:.75}
.hbtn.bl{background:var(--blue)}
.hbtn.gr{background:var(--green)}
.nav{background:var(--card);border-top:1px solid var(--border);display:flex;flex-shrink:0;z-index:10}
.ntab{flex:1;background:none;border:none;color:var(--text3);padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;font-family:'DM Sans',sans-serif}
.ntab.on{color:var(--orange)}
.ntab .ni{font-size:20px;line-height:1}
.ntab .nl{font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scr{display:none;padding:14px}
.scr.on{display:block}
.st{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;margin-top:18px}
.st:first-child{margin-top:0}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.crow{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;transition:background .12s;user-select:none}
.crow:active{background:var(--card2)}
.crow+.crow{border-top:1px solid var(--border)}
.ci{font-size:20px;flex-shrink:0}
.ct{flex:1;min-width:0}
.cn{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{font-size:11px;color:var(--text3);margin-top:2px}
.cbadge{background:var(--orange);color:white;font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;flex-shrink:0}
.cmore{color:var(--text3);font-size:18px;flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px}
.empty{text-align:center;padding:50px 20px 30px}
.empty .ei{font-size:44px;margin-bottom:14px}
.empty .et{color:var(--text3);font-size:14px;line-height:1.6}
.bbtn{width:100%;background:var(--orange);color:white;border:none;border-radius:10px;padding:15px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:opacity .12s}
.bbtn:active{opacity:.8}
.bbtn.sec{background:var(--card);color:var(--text2);border:1px dashed var(--border2)}
.bbtn.pur{background:var(--purplebg);color:#c4b5fd;border:1px solid var(--purple)}
.bbtn.bl{background:var(--blue)}
.flbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.fw{background:var(--card2);border:1px solid var(--border2);border-radius:8px;display:flex;align-items:center;padding:11px 13px;gap:10px;margin-bottom:10px}
.fw:focus-within{border-color:var(--orange)}
.fw input,.fw textarea{background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;flex:1;min-width:0;outline:none;resize:none;line-height:1.5}
.fw input::placeholder,.fw textarea::placeholder{color:var(--text3);font-style:italic}
.mic{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:2px;flex-shrink:0;line-height:1}
.mic.rec{color:var(--red);animation:pl .8s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.reci{display:none;align-items:center;gap:8px;background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:8px 12px;margin-bottom:10px}
.reci.on{display:flex}
.recdot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pl .8s infinite;flex-shrink:0}
.rectxt{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:1px;flex:1}
.rectmr{font-family:'DM Mono',monospace;font-size:12px;color:var(--red)}
.pbts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pbtn{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:12px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text2);transition:all .12s}
.pbtn:active{border-color:var(--orange)}
.pbtn .pi{font-size:22px}
input[type=file]{display:none}
.pprev{display:none;position:relative;border-radius:8px;overflow:hidden;margin-bottom:10px;background:var(--card2)}
.pprev.on{display:block}
.pprev img{width:100%;max-height:200px;object-fit:contain;display:block}
.pdel{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:white;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.obsitem{background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.obsimg img{width:100%;max-height:180px;object-fit:contain;background:#111;display:block}
.obsbody{padding:10px 12px}
.obsmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:6px}
.obsnum{font-family:'DM Mono',monospace;font-size:10px;color:var(--orange);letter-spacing:1px;flex-shrink:0}
.obstm{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);flex:1}
.obsacts{display:flex;gap:4px;flex-shrink:0}
.obsact{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px}
.obsnote{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.rtabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.rtabs::-webkit-scrollbar{display:none}
.rtab{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .12s;display:flex;align-items:center;gap:4px}
.rtab.on{background:var(--orange);border-color:var(--orange);color:white}
.bc{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.bci{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;cursor:pointer}
.bci:hover{color:var(--text2)}
.bci.cur{color:var(--text);cursor:default}
.bcsep{color:var(--text3);font-size:12px}
.ccard{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px;position:relative}
.cdel{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px}
.emodes2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.emodes3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.emode{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--text2);text-align:center;transition:all .12s}
.emode.on{border-color:var(--orange);color:var(--orange);background:rgba(224,92,20,.08)}
.sbox{background:var(--purplebg);border:1px solid var(--purple);border-radius:10px;padding:14px;margin-bottom:14px}
.stitleIA{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:#a78bfa;margin-bottom:8px}
.stext{font-size:13px;color:var(--text2);line-height:1.7}
.stext p{margin-bottom:8px}
.stext strong{color:var(--text)}
.mover{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end}
.mover.on{display:flex}
.msheet{background:var(--card);border-radius:16px 16px 0 0;padding:20px 20px 36px;width:100%}
.msheet.tall{max-height:92vh;overflow-y:auto}
.mhandle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin-bottom:4px}
.msub{font-size:12px;color:var(--text3);margin-bottom:14px}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.mcancel{background:var(--card2);color:var(--text2);border:1px solid var(--border2);border-radius:8px;padding:12px;font-size:14px;cursor:pointer}
.mok{background:var(--orange);color:white;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer}
.ash{position:fixed;inset:0;z-index:100;display:none}
.ash.on{display:block}
.ashbg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.ashc{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-radius:16px 16px 0 0;padding:16px 16px 36px}
.ashtitle{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text3);text-align:center;margin-bottom:14px}
.abtn{display:block;width:100%;background:var(--card2);border:none;border-radius:8px;padding:14px 16px;color:var(--text);font-size:14px;cursor:pointer;text-align:left;margin-bottom:8px}
.abtn:active{opacity:.7}
.abtn.danger{color:var(--red)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1}
.agrid{display:grid;grid-template-columns:1fr 2fr;gap:8px}
.empl-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.empl-hd{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 14px;gap:8px}
.empl-type{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;margin-bottom:3px}
.empl-addr{font-size:13px;color:var(--text);font-weight:600;line-height:1.4}
.empl-acts{display:flex;gap:6px;flex-shrink:0}
.empl-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:13px}
.empl-btn.danger{color:var(--red)}
.empl-vehs{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px}
.empl-veh{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:3px 10px;font-size:11px;color:var(--text2)}
.empl-note-txt{padding:0 14px 12px;font-size:12px;color:var(--text3);font-style:italic}
.stat-types{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-type-btn{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:12px 8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;text-align:center}
.stat-type-btn.on{border-color:var(--orange);color:var(--orange);background:rgba(224,92,20,.08)}
.veh-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.veh-cat-btn{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:7px 12px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .12s}
.veh-cat-btn:active{border-color:var(--orange)}
.veh-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:6px}
.veh-item-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.veh-label-txt{font-size:13px;font-weight:600;color:var(--text)}
.veh-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo" onclick="goHome()"><span>&#9679;</span> REPÉRAGE</div>
  <div class="hbtns">
    <button class="hbtn bl" onclick="genFilmReport()">&#127916; FILM</button>
    <button class="hbtn gr" onclick="openMap()">&#128506;</button>
    <button class="hbtn" onclick="genReport()">&#8595; RAPPORT</button>
  </div>
</div>
<div class="main" id="main">
  <div class="scr on" id="scr-projets"><div id="c-projets"></div></div>
  <div class="scr" id="scr-decors"><div id="c-decors"></div></div>
  <div class="scr" id="scr-decor"><div id="c-decor"></div></div>
  <div class="scr" id="scr-sous"><div id="c-sous"></div></div>
</div>
<nav class="nav">
  <button class="ntab on" id="n-projets" onclick="goHome()"><span class="ni">&#127916;</span><span class="nl">Projets</span></button>
  <button class="ntab" id="n-decors" style="display:none" onclick="go('decors')"><span class="ni">&#128205;</span><span class="nl" id="nl-decors">Décors</span></button>
  <button class="ntab" id="n-decor" style="display:none" onclick="go('decor')"><span class="ni">&#127963;</span><span class="nl" id="nl-decor">Décor</span></button>
  <button class="ntab" id="n-sous" style="display:none" onclick="go('sous')"><span class="ni">&#128194;</span><span class="nl" id="nl-sous">Sous-décor</span></button>
</nav>
<div class="toast" id="toast"></div>
<!-- MODAL NOM -->
<div class="mover" id="modal-nom">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtitle" id="mnom-title">NOUVEAU</div>
    <div class="msub" id="mnom-sub">Dictez ou tapez le nom</div>
    <div class="fw"><input type="text" id="mnom-inp" placeholder="Nom..." maxlength="80" autocomplete="off"><button class="mic" id="mnom-mic" onclick="micInput('mnom-inp','mnom-mic')">&#127897;</button></div>
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal('modal-nom')">Annuler</button>
      <button class="mok" id="mnom-ok">Créer</button>
    </div>
  </div>
</div>
<!-- MODAL EDIT OBS -->
<div class="mover" id="modal-edit-obs">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtitle">MODIFIER OBSERVATION</div>
    <div class="fw" style="align-items:flex-start"><textarea id="edit-obs-note" rows="4" style="min-height:90px" placeholder="Votre observation..."></textarea><button class="mic" id="edit-obs-mic" onclick="micInput('edit-obs-note','edit-obs-mic')">&#127897;</button></div>
    <div class="pbts">
      <button class="pbtn" onclick="document.getElementById('f-cam-edit').click()"><span class="pi">&#128247;</span>Photo</button>
      <button class="pbtn" onclick="document.getElementById('f-gal-edit').click()"><span class="pi">&#128444;</span>Galerie</button>
    </div>
    <div id="pprev-edit" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:0"></div>
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal('modal-edit-obs')">Annuler</button>
      <button class="mok" onclick="saveEditObs()">Enregistrer</button>
    </div>
  </div>
</div>
<!-- MODAL STATIONNEMENT -->
<div class="mover" id="modal-stat">
  <div class="msheet tall">
    <div class="mhandle"></div>
    <div class="mtitle" id="mstat-title">EMPLACEMENT</div>
    <div class="flbl">ADRESSE</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div class="fw" style="margin:0"><input type="text" id="mstat-debut" placeholder="Du N°..."></div>
      <div class="fw" style="margin:0"><input type="text" id="mstat-fin" placeholder="Au N°..."></div>
    </div>
    <div class="fw"><input type="text" id="mstat-rue" placeholder="Nom de la rue..."></div>
    <div class="fw"><input type="text" id="mstat-ville" placeholder="Ville (ex: Paris 1er)..."></div>
    <div class="flbl">TYPE</div>
    <div class="stat-types">
      <button class="stat-type-btn" data-type="technique" onclick="setStatType('technique')">&#127916; Technique</button>
      <button class="stat-type-btn" data-type="loge" onclick="setStatType('loge')">&#127917; Loge</button>
      <button class="stat-type-btn" data-type="cantine" onclick="setStatType('cantine')">&#127374; Cantine</button>
      <button class="stat-type-btn" data-type="autre" onclick="setStatType('autre')">&#128230; Autre</button>
    </div>
    <div id="mstat-autre-wrap" style="display:none;margin-bottom:12px">
      <div class="flbl">TYPE LIBRE</div>
      <div class="fw"><input type="text" id="mstat-autre-type" placeholder="Ex: Chevaux, SFX..."></div>
    </div>
    <div id="mstat-vehs" style="display:none">
      <div class="flbl">AJOUTER VÉHICULE</div>
      <div class="veh-grid" id="mstat-veh-cats"></div>
      <div class="flbl">VÉHICULES</div>
      <div id="mstat-veh-list"></div>
    </div>
    <div class="flbl">NOTES</div>
    <div class="fw"><textarea id="mstat-note" rows="2" placeholder="Notes..."></textarea></div>
    <div class="flbl">PHOTOS</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <button class="pbtn" onclick="document.getElementById('f-cam-stat').click()"><span class="pi">&#128247;</span>Photo</button>
      <button class="pbtn" onclick="document.getElementById('f-gal-stat').click()"><span class="pi">&#128444;</span>Galerie</button>
    </div>
    <div id="stat-photos" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px"></div>
    <div class="flbl">GÉOLOCALISATION</div>
    <button class="bbtn sec" style="margin-bottom:12px;padding:10px" onclick="geolocStat()">&#128205; Utiliser ma position actuelle</button>
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal('modal-stat')">Annuler</button>
      <button class="mok" onclick="saveEmplacement()">Enregistrer</button>
    </div>
  </div>
</div>
<!-- ACTION SHEET -->
<div class="ash" id="ash">
  <div class="ashbg" onclick="closeAsh()"></div>
  <div class="ashc">
    <div class="ashtitle" id="ash-title"></div>
    <div id="ash-btns"></div>
    <button class="abtn" onclick="closeAsh()" style="color:var(--text3);text-align:center">Annuler</button>
  </div>
</div>
<input type="file" id="f-cam" accept="image/*" capture="environment">
<input type="file" id="f-gal" accept="image/*">
<input type="file" id="f-cam-edit" accept="image/*" capture="environment">
<input type="file" id="f-gal-edit" accept="image/*">
<input type="file" id="f-cam-stat" accept="image/*" capture="environment">
<input type="file" id="f-gal-stat" accept="image/*">
<script>

function idbOpen(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('RepProDB',1);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('data'))db.createObjectStore('data');};
    req.onsuccess=e=>{IDB=e.target.result;res(IDB);};
    req.onerror=()=>rej(req.error);
  });
}
async function dbSave(){
  const json=JSON.stringify(DB);
  try{localStorage.setItem('repv4',json);}catch(e){}
  try{
    if(!IDB)await idbOpen();
    const tx=IDB.transaction('data','readwrite');
    tx.objectStore('data').put(json,'repv4');
  }catch(e){}
}
async function dbLoad(){
  try{
    if(!IDB)await idbOpen();
    const data=await new Promise((res,rej)=>{
      const tx=IDB.transaction('data','readonly');
      const req=tx.objectStore('data').get('repv4');
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>rej(req.error);
    });
    if(data){DB=JSON.parse(data);migrate();return;}
  }catch(e){}
  try{
    for(const key of['repv4','repv3','rep_v2','rep_v1']){
      const s=localStorage.getItem(key);
      if(s){
        const o=JSON.parse(s);
        if(o.projets)DB={projets:o.projets};
        else if(o.decors)DB={projets:[{id:uid(),nom:'Mon Projet',decors:o.decors}]};
        migrate();dbSave();return;
      }
    }
  }catch(e){}
}
function migrate(){
  DB.projets.forEach(p=>{
    if(!p.decors)p.decors=[];
    p.decors.forEach(d=>{migTD(d);if(!d.sous)d.sous=[];d.sous.forEach(s=>migTD(s));});
  });
}
function migTD(e){
  if(!e.tabData)e.tabData=initTD();
  RUBS.forEach(r=>{
    if(!e.tabData[r.id]){
      if(r.sp==='stat')e.tabData[r.id]={emplacements:[]};
      else if(r.sp==='elec')e.tabData[r.id]={mode:'',puissance:'',obs:[]};
      else if(r.sp==='loges'){
        const old=e.tabData[r.id]||{};
        // Migrate old single-structure format to new multi-structure
        const structs=old.structures||(old.structure?[old.structure]:[]);
        e.tabData[r.id]={
          structures:structs,
          barnum:{lieu:old.structure==='barnum'?(old.lieu||''):''},
          dur:{lieu:old.structure==='dur'||old.structure===''?(old.lieu||''):'',contact:old.contact||'',tel:old.tel||'',acces:old.acces||''},
          obs:old.obs||[]
        };
      }
      else e.tabData[r.id]={obs:[]};
    }
    if(r.sp==='stat'&&!e.tabData[r.id].emplacements)e.tabData[r.id]={emplacements:[]};
  });
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function proj(id){return DB.projets.find(p=>p.id===(id||S.pid))}
function decor(id){const p=proj();return p?p.decors.find(d=>d.id===(id||S.did)):null}
function sous(did,sid){const d=decor(did);return d?d.sous.find(s=>s.id===sid):null}
function initTD(){
  const td={};
  RUBS.forEach(r=>{
    if(r.sp==='stat')td[r.id]={emplacements:[]};
    else if(r.sp==='elec')td[r.id]={mode:'',puissance:'',obs:[]};
    else if(r.sp==='loges')td[r.id]={structures:[],barnum:{lieu:''},dur:{lieu:'',contact:'',tel:'',acces:''},obs:[]};
    else td[r.id]={obs:[]};
  });
  return td;
}
function cntObs(e){
  if(!e||!e.tabData)return 0;
  return RUBS.reduce((a,r)=>a+(r.sp==='stat'?(e.tabData[r.id]?.emplacements?.length||0):(e.tabData[r.id]?.obs?.length||0)),0);
}
function totDecor(d){return cntObs(d)+(d.sous||[]).reduce((a,s)=>a+cntObs(s),0)}

function go(name){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  document.getElementById('scr-'+name).classList.add('on');
  const n=document.getElementById('n-'+name);if(n)n.classList.add('on');
  if(name==='decor')S.sid=null; // Reset sous context when going back to décor
  if(name==='projets')rProjets();
  else if(name==='decors')rDecors();
  else if(name==='decor')rDecor();
  else if(name==='sous')rSous();
  document.getElementById('main').scrollTop=0;
}
function goHome(){
  S.pid=null;S.did=null;S.sid=null;
  ['decors','decor','sous'].forEach(id=>document.getElementById('n-'+id).style.display='none');
  go('projets');
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('on'),3000);
}
function openNom(title,sub,val,cb){
  document.getElementById('mnom-title').textContent=title;
  document.getElementById('mnom-sub').textContent=sub||'Dictez ou tapez le nom';
  const inp=document.getElementById('mnom-inp');
  inp.value=val||'';nomCb=cb;
  document.getElementById('modal-nom').classList.add('on');
  setTimeout(()=>inp.focus(),300);
}
function closeModal(id){document.getElementById(id).classList.remove('on')}
document.getElementById('mnom-ok').onclick=function(){
  const v=document.getElementById('mnom-inp').value.trim();
  if(!v){toast('Entrez un nom');return;}
  closeModal('modal-nom');if(nomCb)nomCb(v);
};
document.getElementById('mnom-inp').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('mnom-ok').click();});
function closeAsh(){document.getElementById('ash').classList.remove('on')}

function rProjets(){
  const el=document.getElementById('c-projets');
  let h='';
  if(!DB.projets.length){
    h='<div class="empty"><div class="ei">&#127916;</div><div class="et">Aucun projet.<br>Créez votre premier projet.</div></div>';
  }else{
    h='<div class="st">Mes projets ('+DB.projets.length+')</div><div class="card">';
    DB.projets.forEach((p,i)=>{
      const nb=p.decors.length,obs=p.decors.reduce((a,d)=>a+totDecor(d),0);
      h+='<div class="crow" onclick="selProjet(\''+p.id+'\')"><span class="ci">&#127916;</span>'
        +'<div class="ct"><div class="cn">'+esc(p.nom)+'</div><div class="cs">'+nb+' décor'+(nb>1?'s':'')+(obs?' · '+obs+' entrées':'')+'</div></div>'
        +(obs?'<span class="cbadge">'+obs+'</span>':'')
        +'<button class="cmore" onclick="event.stopPropagation();ashProjet(\''+p.id+'\','+i+')">&#8942;</button></div>';
    });
    h+='</div>';
  }
  h+='<button class="bbtn" onclick="newProjet()">+ Nouveau projet</button>';
  el.innerHTML=h;
}
function selProjet(id){
  S.pid=id;S.did=null;S.sid=null;
  const p=proj(id);
  document.getElementById('nl-decors').textContent=p.nom.substring(0,12);
  document.getElementById('n-decors').style.display='';
  document.getElementById('n-decor').style.display='none';
  document.getElementById('n-sous').style.display='none';
  go('decors');
}
function newProjet(){openNom('NOUVEAU PROJET','Ex: Film Projecta, Pub BMP...','',val=>{const p={id:uid(),nom:val,decors:[]};DB.projets.push(p);dbSave();selProjet(p.id);toast('Projet créé');});}
function ashProjet(id,i){
  const p=proj(id);
  document.getElementById('ash-title').textContent=p.nom.toUpperCase();
  document.getElementById('ash-btns').innerHTML=
    '<button class="abtn" onclick="closeAsh();renomProjet(\''+id+'\')">&#9999; Renommer</button>'
    +(i>0?'<button class="abtn" onclick="closeAsh();mvProjet(\''+id+'\',-1)">&#8593; Monter</button>':'')
    +(i<DB.projets.length-1?'<button class="abtn" onclick="closeAsh();mvProjet(\''+id+'\',1)">&#8595; Descendre</button>':'')
    +'<button class="abtn danger" onclick="closeAsh();delProjet(\''+id+'\')">&#128465; Supprimer ce projet</button>';
  document.getElementById('ash').classList.add('on');
}
function renomProjet(id){const p=proj(id);openNom('RENOMMER','',p.nom,val=>{p.nom=val;dbSave();rProjets();toast('Renommé');});}
function mvProjet(id,dir){const i=DB.projets.findIndex(p=>p.id===id),ni=i+dir;if(ni<0||ni>=DB.projets.length)return;[DB.projets[i],DB.projets[ni]]=[DB.projets[ni],DB.projets[i]];dbSave();rProjets();}
function delProjet(id){const p=proj(id);if(!confirm('Supprimer "'+p.nom+'" ?'))return;DB.projets=DB.projets.filter(x=>x.id!==id);if(S.pid===id)goHome();dbSave();rProjets();toast('Supprimé');}

function rDecors(){
  const p=proj();if(!p){goHome();return;}
  const el=document.getElementById('c-decors');
  let h='<button class="bbtn" onclick="newDecor()">+ Nouveau décor</button>';
  if(!p.decors.length){h+='<div class="empty"><div class="ei">&#128205;</div><div class="et">Aucun décor.</div></div>';}
  else{
    h+='<div class="st">Décors ('+p.decors.length+')</div><div class="card">';
    p.decors.forEach((d,i)=>{
      const tot=totDecor(d);
      const sub=(d.sous.length?d.sous.length+' sous-décor'+(d.sous.length>1?'s':''):'Pas de sous-décor')+(tot?' · '+tot+' entrées':'');
      h+='<div class="crow" onclick="selDecor(\''+d.id+'\')"><span class="ci">&#128205;</span>'
        +'<div class="ct"><div class="cn">'+esc(d.nom)+'</div><div class="cs">'+sub+'</div></div>'
        +(tot?'<span class="cbadge">'+tot+'</span>':'')
        +'<button class="cmore" onclick="event.stopPropagation();ashDecor(\''+d.id+'\','+i+')">&#8942;</button></div>';
    });
    h+='</div>';
  }
  el.innerHTML=h;
}

}
function newDecor(){openNom('NOUVEAU DÉCOR','','',val=>{const p=proj();if(!p)return;const d={id:uid(),nom:val,adresse:'',codepostal:'',ville:'',contacts:[],tabData:initTD(),sous:[]};p.decors.push(d);dbSave();selDecor(d.id);toast('Décor créé');});}
function ashDecor(id,i){
  const p=proj(),d=decor(id);
  document.getElementById('ash-title').textContent=d.nom.toUpperCase();

function renomDecor(id){const d=decor(id);openNom('RENOMMER DÉCOR','',d.nom,val=>{d.nom=val;dbSave();document.getElementById('nl-decor').textContent=val.substring(0,10);rDecors();toast('Renommé');});}
function mvDecor(id,dir){const p=proj(),i=p.decors.findIndex(d=>d.id===id),ni=i+dir;if(ni<0||ni>=p.decors.length)return;[p.decors[i],p.decors[ni]]=[p.decors[ni],p.decors[i]];dbSave();rDecors();}
function delDecor(id){const d=decor(id);if(!confirm('Supprimer "'+d.nom+'" ?'))return;const p=proj();p.decors=p.decors.filter(x=>x.id!==id);if(S.did===id){S.did=null;document.getElementById('n-decor').style.display='none';document.getElementById('n-sous').style.display='none';}dbSave();go('decors');toast('Supprimé');}

  const el=document.getElementById('c-decor');
  let h='<div class="bc"><span class="bci" onclick="go(\'decors\')">'+esc(p.nom)+'</span><span class="bcsep">&#8250;</span><span class="bci cur">'+esc(d.nom)+'</span></div>';

  h+='<div class="flbl">ADRESSE</div><div class="fw" style="margin-bottom:8px"><input type="text" placeholder="Rue, numéro..." value="'+esc(d.adresse||'')+'" oninput="decor(\''+d.id+'\').adresse=this.value;dbSave()"<button class=\"mic\" onclick=\"geolocDecor(\'\'+d.id+\'\')\" style=\"color:var(--orange)\" title=\"Position GPS\">&#128205;</button>></div>';
  h+='<div class="agrid"><div><div class="flbl">CP</div><div class="fw"><input type="text" placeholder="75001" value="'+esc(d.codepostal||'')+'" oninput="decor(\''+d.id+'\').codepostal=this.value;dbSave()"></div></div>';
  h+='<div><div class="flbl">VILLE</div><div class="fw"><input type="text" placeholder="Paris" value="'+esc(d.ville||'')+'" oninput="decor(\''+d.id+'\').ville=this.value;dbSave()"></div></div></div></div>';
  h+='<div class="st">&#128203; Contacts</div>';

      +'<div class="flbl">NOM / FONCTION</div>'
      +'<div class="fw" style="margin-bottom:8px"><input type="text" placeholder="Nom..." value="'+esc(c.nom)+'" oninput="svContact(\''+d.id+'\',\''+c.id+'\',\'nom\',this.value)"><button class="mic" onclick="micInline(this,v=>{this.previousElementSibling.value=v;svContact(\''+d.id+'\',\''+c.id+'\',\'nom\',v)})">&#127897;</button></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
      +'<div><div class="flbl">TÉL.</div><div class="fw"><input type="tel" placeholder="Tél." value="'+esc(c.tel)+'" oninput="svContact(\''+d.id+'\',\''+c.id+'\',\'tel\',this.value)"></div></div>'
      +'<div><div class="flbl">EMAIL</div><div class="fw"><input type="email" placeholder="Email" value="'+esc(c.mail)+'" oninput="svContact(\''+d.id+'\',\''+c.id+'\',\'mail\',this.value)"></div></div>'
      +'</div></div>';
  });
  h+='<button class="bbtn sec" onclick="addContact(\''+d.id+'\')">+ Ajouter un contact</button>';
  h+='<div class="st">Sous-décors ('+d.sous.length+')</div>';
  if(d.sous.length){
    h+='<div class="card">';
    d.sous.forEach((s,i)=>{const cnt=cntObs(s);h+='<div class="crow" onclick="selSous(\''+d.id+'\',\''+s.id+'\')"><span class="ci">&#128194;</span><div class="ct"><div class="cn">'+esc(s.nom)+'</div><div class="cs">'+(cnt?cnt+' entrées':'Aucune entrée')+'</div></div>'+(cnt?'<span class="cbadge">'+cnt+'</span>':'')+'<button class="cmore" onclick="event.stopPropagation();ashSous(\''+d.id+'\',\''+s.id+'\','+i+')">&#8942;</button></div>';});
    h+='</div>';
  }
  h+='<button class="bbtn sec" onclick="newSous(\''+d.id+'\')">+ Nouveau sous-décor</button>';
  h+='<div class="st">Rubriques</div>';
  h+=buildRubTabs(S.rub,'decor');
  h+='<div id="rc-decor">'+buildRubContent(S.rub,S.did,'')+'</div>';
  el.innerHTML=h;
}
function svContact(did,cid,f,v){const d=decor(did);const c=(d.contacts||[]).find(x=>x.id===cid);if(c){c[f]=v;dbSave();}}
function addContact(did){const d=decor(did);if(!d.contacts)d.contacts=[];d.contacts.push({id:uid(),nom:'',tel:'',mail:''});dbSave();rDecor();}
function delContact(did,cid){const d=decor(did);d.contacts=d.contacts.filter(c=>c.id!==cid);dbSave();rDecor();}

function selSous(did,sid){S.did=did;S.sid=sid;S.rub='notes';const s=sous(did,sid);document.getElementById('nl-sous').textContent=s.nom.substring(0,10);document.getElementById('n-sous').style.display='';go('sous');}
function newSous(did){openNom('NOUVEAU SOUS-DÉCOR','','',val=>{const d=decor(did);d.sous.push({id:uid(),nom:val,tabData:initTD()});dbSave();selSous(did,d.sous[d.sous.length-1].id);toast('Sous-décor créé');});}
function ashSous(did,sid,i){

  document.getElementById('ash-btns').innerHTML=
    '<button class="abtn" onclick="closeAsh();renomSous(\''+did+'\',\''+sid+'\')">&#9999; Renommer</button>'
    +(i>0?'<button class="abtn" onclick="closeAsh();mvSous(\''+did+'\',\''+sid+'\',-1)">&#8593; Monter</button>':'')
    +(i<d.sous.length-1?'<button class="abtn" onclick="closeAsh();mvSous(\''+did+'\',\''+sid+'\',1)">&#8595; Descendre</button>':'')
    +'<button class="abtn danger" onclick="closeAsh();delSous(\''+did+'\',\''+sid+'\')">&#128465; Supprimer</button>';
  document.getElementById('ash').classList.add('on');
}
function renomSous(did,sid){const s=sous(did,sid);openNom('RENOMMER','',s.nom,val=>{s.nom=val;dbSave();document.getElementById('nl-sous').textContent=val.substring(0,10);rDecor();toast('Renommé');});}
function mvSous(did,sid,dir){const d=decor(did),i=d.sous.findIndex(s=>s.id===sid),ni=i+dir;if(ni<0||ni>=d.sous.length)return;[d.sous[i],d.sous[ni]]=[d.sous[ni],d.sous[i]];dbSave();rDecor();}
function delSous(did,sid){const s=sous(did,sid);if(!confirm('Supprimer "'+s.nom+'" ?'))return;const d=decor(did);d.sous=d.sous.filter(x=>x.id!==sid);if(S.sid===sid){S.sid=null;document.getElementById('n-sous').style.display='none';}dbSave();rDecor();toast('Supprimé');}
function rSous(){
  const p=proj(),d=decor(S.did),s=sous(S.did,S.sid);if(!s){go('decor');return;}
  const el=document.getElementById('c-sous');
  let h='<div class="bc"><span class="bci" onclick="go(\'decors\')">'+esc(p.nom)+'</span><span class="bcsep">&#8250;</span><span class="bci" onclick="go(\'decor\')">'+esc(d.nom)+'</span><span class="bcsep">&#8250;</span><span class="bci cur">'+esc(s.nom)+'</span></div>';
  h+=buildRubTabs(S.rub,'sous');
  h+='<div id="rc-sous">'+buildRubContent(S.rub,S.did,S.sid)+'</div>';
  el.innerHTML=h;
}

function buildRubTabs(activeRub,screen){
  const e=screen==='sous'?sous(S.did,S.sid):decor(S.did);
  let h='<div class="rtabs">';
  RUBS.forEach(r=>{
    const cnt=e&&e.tabData?(r.sp==='stat'?(e.tabData[r.id]?.emplacements?.length||0):(e.tabData[r.id]?.obs?.length||0)):0;
    h+='<button class="rtab'+(activeRub===r.id?' on':'')+'" onclick="setRub(\''+r.id+'\',\''+screen+'\')">'+r.icon+' '+r.label+(cnt?' <span style="background:rgba(255,255,255,.3);border-radius:10px;padding:0 5px;font-size:9px">'+cnt+'</span>':'')+'</button>';
  });
  return h+'</div>';
}
function setRub(rub,screen){S.rub=rub;curPhotos=[];curPhoto=null;if(screen==='sous')rSous();else rDecor();}

function buildRubContent(rubId,did,sid){
  const r=RUBS.find(x=>x.id===rubId);
  const e=sid?sous(did,sid):decor(did);
  if(!r||!e)return '';
  const td=e.tabData[rubId]||{obs:[]};
  const D="'"+did+"'";const SID="'"+sid+"'";
  let h='';
  if(r.sp==='stat'){
    if(sid){return '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">Le stationnement se gère au niveau du décor principal.</div>';}
    const empls=td.emplacements||[];
    const typeColors={technique:'#1a5fa0',loge:'#7c3aed',cantine:'#1e8a4a',autre:'#5a5650'};
    const typeLabels={technique:'TECHNIQUE',loge:'LOGES',cantine:'CANTINE',autre:'AUTRE'};
    if(!empls.length)h+='<div class="empty" style="padding:30px 0"><div class="ei" style="font-size:36px">&#128652;</div><div class="et">Ajoutez votre plan de stationnement.</div></div>';
    else{
      empls.forEach(empl=>{
        const color=typeColors[empl.type]||'#5a5650';
        const parts=[];
        if(empl.numDebut&&empl.numFin)parts.push('Du '+empl.numDebut+' au '+empl.numFin);
        else if(empl.numDebut)parts.push('N° '+empl.numDebut);
        if(empl.rue)parts.push(empl.rue);if(empl.ville)parts.push(empl.ville);
        h+='<div class="empl-card"><div class="empl-hd"><div><div class="empl-type" style="color:'+color+'">'+esc(typeLabels[empl.type]||(empl.autreType||'AUTRE').toUpperCase())+'</div><div class="empl-addr">'+esc(parts.join(' '))+'</div></div>';
        h+='<div class="empl-acts"><button class="empl-btn" onclick="openStatModal('+D+','+SID+',\''+empl.id+'\')">&#9999;</button><button class="empl-btn danger" onclick="delEmpl('+D+','+SID+',\''+empl.id+'\')">&#128465;</button></div></div>';
        if(empl.vehicules&&empl.vehicules.length){h+='<div class="empl-vehs">';empl.vehicules.forEach(v=>{h+='<span class="empl-veh">'+esc(v.label)+(v.note?' — '+esc(v.note):'')+'</span>';});h+='</div>';}
        if(empl.note)h+='<div class="empl-note-txt">'+esc(empl.note)+'</div>';
        h+='</div>';
      });
    }
    h+='<button class="bbtn sec" style="margin-top:8px" onclick="openStatModal('+D+','+SID+',\'\')">+ Ajouter emplacement</button>';
    h+='<button class="bbtn bl" onclick="genStatPlan('+D+','+SID+')">&#128202; Générer plan stationnement</button>';
    return h;
  }
  if(r.sp==='elec'){
    h+='<div class="st">Mode électrique</div><div class="emodes3">';
    [{m:'direct',l:'&#9889; Direct'},{m:'groupe',l:'&#128267; Groupe'},{m:'mixte',l:'Mixte'}].forEach(x=>{

function addObs(rubId,did,sid){
  if(isRec)stopDictee();
  const e=sid?sous(did,sid):decor(did);
  const noteEl=document.getElementById('obs-note');
  const note=(noteEl?noteEl.value:'').trim();
  // Also restore curPhoto from session in case it was lost
  if(!curPhoto){try{curPhoto=sessionStorage.getItem('curPhoto')||null;}catch(e){}}
  // Collect all photos from curPhotos array
  if(!curPhotos)curPhotos=[];
  if(curPhoto){curPhotos.push(curPhoto);curPhoto=null;}
  const photos=[...curPhotos];
  if(!note&&!photos.length){toast('Ajoutez une note ou une photo');return;}
  if(!e||!e.tabData||!e.tabData[rubId]){toast('Erreur: rubrique introuvable');return;}
  const td=e.tabData[rubId];
  if(!td.obs)td.obs=[];
  const num=td.obs.length?Math.max(...td.obs.map(o=>o.num))+1:1;
  td.obs.push({id:uid(),num,note,photos,heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})});
  curPhotos=[];curPhoto=null;
  try{sessionStorage.removeItem('curPhoto');}catch(e){}
  dbSave();
  if(sid)rSous();else rDecor();
  toast('Observation ajoutée');
}

function geolocDecor(did){
  if(!navigator.geolocation){toast('Géolocalisation non disponible');return;}
  toast('Localisation en cours...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude,lon=pos.coords.longitude;
    try{
      const res=await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon+'&accept-language=fr');
      const data=await res.json();
      const d=decor(did);
      if(data.address){
        const road=data.address.road||data.address.pedestrian||'';
        const num=data.address.house_number||'';
        const addr=(num?num+' ':'')+road;
        const cp=data.address.postcode||'';
        const vil=data.address.city||data.address.town||data.address.village||'';
        d.adresse=addr;d.codepostal=cp;d.ville=vil;
        // Update DOM directly without full re-render
        const iAddr=document.getElementById('inp-addr-'+did);
        const iCp=document.getElementById('inp-cp-'+did);
        const iVille=document.getElementById('inp-ville-'+did);
        if(iAddr)iAddr.value=addr;
        if(iCp)iCp.value=cp;
        if(iVille)iVille.value=vil;
      }
      dbSave();toast('Adresse localisée ! Vous pouvez la modifier.');
    }catch(e){toast('Erreur géolocalisation');}
  },err=>{toast('Accès position refusé');},{enableHighAccuracy:true,timeout:10000});
}

function geolocStat(inputPrefix){
  if(!navigator.geolocation){toast('Géolocalisation non disponible');return;}
  toast('Localisation...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude,lon=pos.coords.longitude;
    try{
      const res=await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon+'&accept-language=fr');
      const data=await res.json();
      if(data.address){
        const rue=document.getElementById('mstat-rue');
        const ville=document.getElementById('mstat-ville');
        if(rue&&!rue.value)rue.value=(data.address.road||data.address.pedestrian||'');
        if(ville&&!ville.value)ville.value=(data.address.city||data.address.town||data.address.village||'');
        toast('Position trouvée');
      }
    }catch(e){toast('Erreur');}
  },err=>{toast('Accès position refusé');});
}

  const wordHtml=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word">

async function genStatPlan(did,sid){

  html+='var EMPLS='+emplsJson+';var META='+metaJson+';';

function ll2t(lat,lon,z){const x=Math.floor((lon+180)/360*Math.pow(2,z));const n=Math.PI-2*Math.PI*lat/180;const y=Math.floor((1+Math.log(Math.tan(n/2)+(1/Math.cos(n*Math.PI/180)))/Math.PI)/2*Math.pow(2,z));return{x,y,z};}
function t2ll(x,y,z){const n=Math.pow(2,z);return{lat:Math.atan(Math.sinh(Math.PI*(1-2*y/n)))*180/Math.PI,lon:x/n*360-180};}
async function fetchTile(x,y,z){return new Promise((ok,fail)=>{const img=new Image();img.crossOrigin="anonymous";img.onload=()=>{const c=document.createElement("canvas");c.width=256;c.height=256;const ctx=c.getContext("2d");ctx.drawImage(img,0,0);ok(c.toDataURL("image/png").split(",")[1]);};img.onerror=()=>fail(new Error("tile"));var servers=["a","b","c"];var s=servers[(x+y)%3];img.src="https://"+s+".basemaps.cartocdn.com/light_all/"+z+"/"+x+"/"+y+".png";});}
async function buildMap(lats,lons,marks){
  if(!lats.length)return null;
  const W=760,H=440;let z=15;
  const dlat=Math.max(...lats)-Math.min(...lats);const dlon=Math.max(...lons)-Math.min(...lons);
  if(dlat>0.03||dlon>0.05)z=14;if(dlat>0.07||dlon>0.12)z=13;if(dlat>0.15||dlon>0.25)z=12;
  const cLat=(Math.min(...lats)+Math.max(...lats))/2;const cLon=(Math.min(...lons)+Math.max(...lons))/2;
  const ct=ll2t(cLat,cLon,z);
  const nX=Math.ceil(W/256)+2,nY=Math.ceil(H/256)+2;
  const sx=ct.x-Math.floor(nX/2),sy=ct.y-Math.floor(nY/2);
  const can=document.createElement("canvas");can.width=W;can.height=H;const ctx=can.getContext("2d");
  const tl=t2ll(sx,sy,z),br=t2ll(sx+nX,sy+nY,z);
  const latR=tl.lat-br.lat,lonR=br.lon-tl.lon;
  function px(lat,lon){return{x:(lon-tl.lon)/lonR*W,y:(tl.lat-lat)/latR*H};}
  for(let ty=0;ty<nY;ty++){for(let tx=0;tx<nX;tx++){try{const b64=await fetchTile(sx+tx,sy+ty,z);const img=new Image();await new Promise(r=>{img.onload=r;img.onerror=r;img.src="data:image/png;base64,"+b64;});ctx.drawImage(img,tx*256-(ct.x-sx)*256+W/2-128,ty*256-(ct.y-sy)*256+H/2-128);}catch(e){}}}
  const MC=["e05c14","1a5fa0","1e8a4a","7c3aed","c0392b","d35400","27ae60"];
  marks.forEach((m,i)=>{if(!m.lat)return;const{x,y}=px(m.lat,m.lon);const col="#"+(m.col||MC[i%MC.length]);ctx.beginPath();ctx.arc(x,y,13,0,2*Math.PI);ctx.fillStyle=col;ctx.fill();ctx.strokeStyle="white";ctx.lineWidth=3;ctx.stroke();ctx.fillStyle="white";ctx.font="bold 12px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(m.n,x,y);});
  ctx.fillStyle="rgba(255,255,255,0.8)";ctx.fillRect(0,H-16,230,16);ctx.fillStyle="#555";ctx.font="9px Arial";ctx.textAlign="left";ctx.fillText("© OpenStreetMap contributors",3,H-4);
  return can.toDataURL("image/png").split(",")[1];
}
async function genPPT(){

    if(mg){allLat.push(mg.lat);allLon.push(mg.lon);}

    else{slide.addShape(pptx.ShapeType.rect,{x:0,y:1.1,w:7.2,h:4.5,fill:{color:"e8f4f8"},line:{color:"cccccc",pt:1}});slide.addText("Carte non disponible",{x:2,y:3,w:3.2,h:0.5,fontSize:12,color:"666666",align:"center"});}
    const LX=7.3,LW=5.7;let LY=1.2;

    const byType={};gc.forEach((g,i)=>{if(!byType[g.type])byType[g.type]=[];byType[g.type].push({...g,n:i+1});});
    for(const[type,items]of Object.entries(byType)){
      if(LY>5.2)break;
      const col=TCOLORS[type]||"5a5650";const lbl=TLABELS[type]||type.toUpperCase();
      slide.addShape(pptx.ShapeType.rect,{x:LX,y:LY,w:LW,h:0.26,fill:{color:col}});
      slide.addText(lbl,{x:LX+0.05,y:LY,w:LW-0.1,h:0.26,fontSize:9,color:"FFFFFF",bold:true,fontFace:"Arial"});LY+=0.28;
      items.forEach(item=>{
        if(LY>5.35)return;

}<\/script>`;
  html+='<div class="cover"><div class="cvt">PLAN STATIONNEMENT</div><div class="cvs">'+esc(pnom)+' — '+esc(entityName)+'</div><div class="cvd">'+date+'</div>';

function getSR(){const SRC=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SRC){toast('Dictée non supportée');return null;}const sr=new SRC();sr.lang='fr-FR';sr.continuous=false;sr.interimResults=false;sr.maxAlternatives=1;return sr;}
function startDictee(btn,targetId,cb){
  if(isRec){stopDictee();return;}
  const sr=getSR();if(!sr)return;
  SR=sr;recBtn=btn;recTarget=targetId;recCb=cb;
  sr.onstart=()=>{isRec=true;btn.classList.add('rec');btn.textContent='&#9209;';recSec=0;const ind=document.getElementById('reci');if(ind)ind.classList.add('on');recTmr=setInterval(()=>{recSec++;const el=document.getElementById('rectmr');if(el)el.textContent=Math.floor(recSec/60)+':'+String(recSec%60).padStart(2,'0');},1000);toast('Dictée... appuyez stop pour terminer');};
  sr.onresult=e=>{const text=e.results[0][0].transcript;if(targetId){const el=document.getElementById(targetId);if(el&&document.body.contains(el))el.value=(el.value?el.value+' ':'')+text;}if(cb)cb(text);toast('Transcrit');};
  sr.onerror=e=>{toast('Erreur micro: '+e.error);stopDictee();};
  sr.onend=()=>{stopDictee();};
  try{sr.start();}catch(e){toast('Micro non disponible');}
}
function stopDictee(){if(SR){try{SR.stop();}catch(e){}}SR=null;isRec=false;clearInterval(recTmr);if(recBtn){recBtn.classList.remove('rec');recBtn.textContent='&#127897;';}const ind=document.getElementById('reci');if(ind)ind.classList.remove('on');recBtn=null;recTarget=null;recCb=null;}
function micMain(){const btn=document.getElementById('mic-main');if(isRec){stopDictee();return;}startDictee(btn,'obs-note',null);}
function micInline(btn,cb){if(isRec){stopDictee();return;}startDictee(btn,null,cb);}
function micInput(inputId,btnId){const btn=document.getElementById(btnId);if(isRec){stopDictee();return;}startDictee(btn,null,v=>{const el=document.getElementById(inputId);if(el)el.value=(el.value?el.value+' ':'')+v;});}

async function callAI(prompt){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
  const data=await resp.json();if(data.error)throw new Error(data.error.message);
  return data.content?.map(c=>c.text||'').join('')||'';
}
function mdHtml(md){return(md||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/^#{1,3} (.+)/gm,'<strong>$1</strong>').replace(/^[-•] (.+)/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>').replace(/\n\n/g,'</p><p>').replace(/^(.)/,'<p>$1').replace(/(.)$/,'$1</p>');}

async function doSynth(rubId,did,sid){
  const e=sid?sous(did,sid):decor(did);const r=RUBS.find(x=>x.id===rubId);
  const obs=e.tabData[rubId]?.obs||[];if(!obs.length){toast('Ajoutez des observations d\'abord');return;}
  toast('Synthèse IA en cours...');
  const notes=obs.map(o=>'- '+(o.note||'')).filter(l=>l.trim()!=='-').join('\n');
  try{
    const ckey=(sid||did)+'_'+rubId;
    const result=await callAI('Tu es régisseur de cinéma expérimenté. Synthétise ces observations de repérage pour la rubrique "'+r.label+'".\nStructure ta réponse en 3 points:\n1. SITUATION: Décris ce qui a été observé\n2. POINTS D\'ATTENTION: Contraintes ou problèmes identifiés\n3. ACTIONS À PRÉVOIR: Ce qu\'il faut planifier concrètement\nSois factuel, précis, professionnel.\n\nObservations:\n'+notes);
    synthCache[ckey]=result;if(sid)rSous();else rDecor();toast('Synthèse générée');
  }catch(e){toast('Erreur IA: '+e.message);}
}

function genReport(){

  if(!S.did){if(!p.decors.length){toast('Aucun décor');return;}openRpt(buildStdReport(p.nom.toUpperCase(),p.decors));}
  else{openRpt(buildStdReport(decor(S.did).nom.toUpperCase(),[decor(S.did)]));}
}
function buildStdReport(titre,decors){
  const date=new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const totalObs=decors.reduce((a,d)=>a+totDecor(d),0);
  let h=rptHead(titre,date,totalObs,decors)+rptBtns()+rptCover(titre,date,decors,totalObs,null)+rptToc(decors);
  decors.forEach(d=>{
    const tot=totDecor(d);
    h+='<div class="dsec"><div class="dband"><span class="dband-n">'+esc(d.nom)+'</span><span class="dband-c">'+tot+' entrées</span></div>';
    if(d.contacts?.length){h+='<div class="cblk"><div class="ct2">CONTACTS</div>';d.contacts.forEach(c=>{h+='<div class="cr"><strong>'+esc(c.nom)+'</strong>'+(c.tel?' — &#128222; '+esc(c.tel):'')+(c.mail?' — &#9993; '+esc(c.mail):'')+'</div>';});h+='</div>';}
    const secD=rptStdSec(d);if(secD)h+='<div class="ssec"><div class="shd"><span class="shdn">&#128203; Général — '+esc(d.nom)+'</span></div>'+secD+'</div>';
    (d.sous||[]).forEach(s=>{const cnt=cntObs(s),sec=rptStdSec(s);if(sec||cnt)h+='<div class="ssec"><div class="shd"><span class="shdn">&#8627; '+esc(s.nom)+'</span><span class="shdb">'+cnt+'</span></div>'+sec+'</div>';});
    h+='</div>';
  });
  h+='<div class="pied"><span class="piedl">Généré le '+date+'</span><span class="piedr">&#9679; REPÉRAGE PRO</span></div></body></html>';
  return h;
}
function rptStdSec(entity){

    const td=entity.tabData?.[r.id];if(!td)return;
    if(r.sp==='stat'){
