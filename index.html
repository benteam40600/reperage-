}">

<script>
// Register inline PWA icon
(function(){
  // Create canvas icon for Android homescreen
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" rx="80" fill="#e05c14"/>
    <rect x="100" y="180" width="312" height="220" rx="20" fill="#fff" opacity="0.15"/>
    <rect x="100" y="148" width="312" height="40" rx="10" fill="#fff" opacity="0.9"/>
    <rect x="120" y="155" width="60" height="26" rx="5" fill="#e05c14"/>
    <rect x="200" y="155" width="60" height="26" rx="5" fill="#e05c14"/>
    <rect x="280" y="155" width="60" height="26" rx="5" fill="#e05c14"/>
    <rect x="360" y="155" width="40" height="26" rx="5" fill="#e05c14"/>
    <circle cx="256" cy="310" r="60" fill="#fff" opacity="0.9"/>
    <polygon points="236,285 236,335 286,310" fill="#e05c14"/>
    <text x="256" y="430" text-anchor="middle" font-size="48" font-weight="bold" font-family="Arial,sans-serif" fill="white" letter-spacing="2">REPÉRAGE</text>
  </svg>`;
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'icon'; link.type = 'image/svg+xml'; link.href = url;
  document.head.appendChild(link);
  // Apple touch icon
  const alink = document.createElement('link');
  alink.rel = 'apple-touch-icon'; alink.href = url;
  document.head.appendChild(alink);
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   BASE
═══════════════════════════════════ */
:root {
  --bg: #0a0a0a;
  --card: #161616;
  --card2: #1e1e1e;
  --border: #2a2a2a;
  --border2: #383838;
  --text: #ede9e0;
  --text2: #9a9590;
  --text3: #5a5650;
  --orange: #e05c14;
  --orange2: #f07030;
  --red: #c0392b;
  --green: #1e8a4a;
  --purple: #7c3aed;
  --purplebg: rgba(124,58,237,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════
   HEADER
═══════════════════════════════════ */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 3px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-dot { color: var(--orange); font-size: 24px; }
.header-btn {
  background: var(--orange);
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
}
.header-btn:active { background: var(--orange2); }
.header-btn.blue { background: #1a5fa0; }
.header-btn.blue:active { background: #2070b8; }

/* ═══════════════════════════════════
   NAVIGATION TABS (bottom)
═══════════════════════════════════ */
.nav-bottom {
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
  z-index: 10;
}
.nav-tab {
  flex: 1;
  background: none;
  border: none;
  color: var(--text3);
  padding: 10px 4px 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.nav-tab.active { color: var(--orange); }
.nav-tab .nav-icon { font-size: 22px; line-height: 1; }
.nav-tab .nav-label { font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; }

/* ═══════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════ */
.main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.screen { display: none; padding: 14px; }
.screen.active { display: block; }

/* ═══════════════════════════════════
   CARDS & SECTIONS
═══════════════════════════════════ */
.section-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
  margin-top: 18px;
}
.section-title:first-child { margin-top: 0; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.card-row {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 12px;
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.card-row:active { background: var(--card2); }
.card-row + .card-row { border-top: 1px solid var(--border); }
.card-icon { font-size: 20px; flex-shrink: 0; }
.card-text { flex: 1; min-width: 0; }
.card-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.card-arrow { color: var(--text3); font-size: 12px; flex-shrink: 0; }
.card-badge {
  background: var(--orange);
  color: white;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 10px;
  flex-shrink: 0;
}

/* ═══════════════════════════════════
   BIG BUTTON
═══════════════════════════════════ */
.btn-big {
  width: 100%;
  background: var(--orange);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 10px;
  transition: background 0.12s;
  letter-spacing: 0.5px;
}
.btn-big:active { background: var(--orange2); }
.btn-big.secondary {
  background: var(--card);
  color: var(--text2);
  border: 1px dashed var(--border2);
}
.btn-big.secondary:active { background: var(--card2); }
.btn-big.purple {
  background: var(--purplebg);
  color: #c4b5fd;
  border: 1px solid var(--purple);
}
.btn-big.purple:active { background: rgba(124,58,237,0.2); }
.btn-big.purple:disabled { opacity: 0.5; }

/* ═══════════════════════════════════
   FIELD WITH MIC
═══════════════════════════════════ */
.field-wrap {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  padding: 12px 14px;
  gap: 10px;
  margin-bottom: 10px;
  transition: border-color 0.15s;
}
.field-wrap:focus-within { border-color: var(--orange); }
.field-wrap input, .field-wrap textarea {
  background: none;
  border: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  flex: 1;
  min-width: 0;
  outline: none;
  resize: none;
  line-height: 1.5;
}
.field-wrap input::placeholder,
.field-wrap textarea::placeholder { color: var(--text3); font-style: italic; }
.field-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.mic-btn {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 20px;
  padding: 2px;
  flex-shrink: 0;
  transition: color 0.12s;
  line-height: 1;
}
.mic-btn:active { color: var(--orange); }
.mic-btn.recording { color: var(--red); animation: mic-pulse 0.8s infinite; }
@keyframes mic-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Recording indicator */
.rec-indicator {
  display: none;
  align-items: center;
  gap: 8px;
  background: rgba(192,57,43,0.1);
  border: 1px solid rgba(192,57,43,0.3);
  border-radius: 8px;
  padding: 8px 12px;
  margin-bottom: 10px;
}
.rec-indicator.on { display: flex; }
.rec-dot { width: 7px; height: 7px; background: var(--red); border-radius: 50%; animation: mic-pulse 0.8s infinite; flex-shrink: 0; }
.rec-text { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--red); letter-spacing: 1px; flex: 1; }
.rec-timer { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--red); }

/* ═══════════════════════════════════
   PHOTO ZONE
═══════════════════════════════════ */
.photo-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.photo-btn {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 14px 10px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text2);
  transition: all 0.12s;
  letter-spacing: 0.5px;
}
.photo-btn:active { border-color: var(--orange); background: rgba(224,92,20,0.08); }
.photo-btn .photo-icon { font-size: 24px; }
input[type="file"] { display: none; }
.photo-preview {
  display: none;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 10px;
  background: var(--card2);
}
.photo-preview.show { display: block; }
.photo-preview img { width: 100%; max-height: 220px; object-fit: contain; display: block; }
.photo-preview-remove {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(0,0,0,0.7);
  border: none;
  color: white;
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}

/* ═══════════════════════════════════
   OBSERVATIONS LIST
═══════════════════════════════════ */
.obs-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  overflow: hidden;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
.obs-photo img { width: 100%; max-height: 200px; object-fit: contain; background: #111; display: block; }
.obs-body { padding: 10px 12px; }
.obs-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.obs-num { font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: var(--orange); }
.obs-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); }
.obs-note { font-size: 13px; line-height: 1.55; color: var(--text2); }
.obs-actions { display: flex; gap: 6px; margin-top: 8px; }
.obs-action-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text3);
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 11px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  transition: all 0.12s;
}
.obs-action-btn:active { border-color: var(--red); color: var(--red); }
.obs-action-btn.edit:active { border-color: var(--orange); color: var(--orange); }

/* ═══════════════════════════════════
   ELEC CHOICE BUTTONS
═══════════════════════════════════ */
.choice-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.choice-btn {
  flex: 1;
  min-width: 140px;
  background: var(--card2);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 12px 10px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.12s;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}
.choice-btn.active-green { background: rgba(30,138,74,0.15); border-color: var(--green); color: #4ade80; }
.choice-btn.active-red { background: rgba(192,57,43,0.15); border-color: var(--red); color: #f87171; }

/* ═══════════════════════════════════
   SYNTHESE BOX
═══════════════════════════════════ */
.synth-box {
  background: var(--card);
  border: 1px solid var(--purple);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.synth-head {
  background: rgba(124,58,237,0.12);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(124,58,237,0.2);
}
.synth-head-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: #a78bfa; }
.synth-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0 4px; }
.synth-content { padding: 14px 16px; font-size: 13px; line-height: 1.75; color: var(--text2); }
.synth-content h1,.synth-content h2,.synth-content h3 { font-family:'Bebas Neue',sans-serif; letter-spacing:1.5px; color:#a78bfa; margin:10px 0 5px; }
.synth-content h1{font-size:16px;} .synth-content h2{font-size:14px;} .synth-content h3{font-size:13px;}
.synth-content strong { font-weight:700; color:var(--text); }
.synth-content ul,.synth-content ol { padding-left:18px; margin:6px 0; }
.synth-content li { margin-bottom:3px; }
.synth-content p { margin-bottom:8px; }
.synth-loading { display:flex; align-items:center; gap:10px; color:#a78bfa; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px; }
.dot { display:inline-block; width:5px; height:5px; background:var(--purple); border-radius:50%; animation:dot 1.2s infinite; margin:0 2px; }
.dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* ═══════════════════════════════════
   CONTACTS
═══════════════════════════════════ */
.contact-card {
  background: var(--card2);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  position: relative;
}
.contact-del {
  position: absolute;
  top: 8px; right: 8px;
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
}
.contact-del:active { color: var(--red); }

/* ═══════════════════════════════════
   EMPTY STATE
═══════════════════════════════════ */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text3);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
.empty-text { font-size: 14px; line-height: 1.6; }
.empty-text strong { color: var(--text2); }

/* ═══════════════════════════════════
   RUBRIQUES TABS (horizontal scroll)
═══════════════════════════════════ */
.rubrique-tabs {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding-bottom: 2px;
  margin-bottom: 14px;
  scrollbar-width: none;
}
.rubrique-tabs::-webkit-scrollbar { display: none; }
.rubrique-tab {
  background: var(--card2);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.12s;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  gap: 5px;
}
.rubrique-tab.active { background: var(--orange); border-color: var(--orange); color: white; }
.rubrique-tab:active:not(.active) { border-color: var(--orange); }

/* ═══════════════════════════════════
   BREADCRUMB
═══════════════════════════════════ */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.bc-item { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.bc-sep { color: var(--border2); }
.bc-item.current { color: var(--orange); }

/* ═══════════════════════════════════
   MODAL / OVERLAY
═══════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
.modal-overlay.show { display: flex; }
.modal-sheet {
  background: var(--card);
  border-radius: 16px 16px 0 0;
  border-top: 1px solid var(--border2);
  padding: 20px 20px 32px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 0 auto 18px;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2.5px;
  color: var(--text);
  margin-bottom: 6px;
}
.modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 16px; }
.modal-btns { display: flex; gap: 8px; margin-top: 4px; }
.modal-ok { flex:1; background:var(--orange); color:white; border:none; padding:14px; border-radius:8px; font-weight:600; font-size:15px; cursor:pointer; }
.modal-ok:active { background: var(--orange2); }
.modal-cancel { background:var(--card2); color:var(--text2); border:none; padding:14px 18px; border-radius:8px; cursor:pointer; font-size:15px; }

/* ═══════════════════════════════════
   TOAST
═══════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card2);
  color: var(--text);
  border: 1px solid var(--border2);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.25s;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
  max-width: 90vw;
}
.toast.show { opacity: 1; }

/* ═══════════════════════════════════
   ACTION SHEET (delete/move menu)
═══════════════════════════════════ */
.action-sheet {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  align-items: flex-end;
}
.action-sheet.show { display: flex; }
.action-sheet-bg {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
}
.action-sheet-content {
  position: relative;
  background: var(--card);
  border-radius: 14px 14px 0 0;
  width: 100%;
  padding: 16px 16px 32px;
  z-index: 1;
}
.action-sheet-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text3);
  text-align: center;
  margin-bottom: 14px;
  text-transform: uppercase;
}
.action-btn {
  width: 100%;
  background: var(--card2);
  border: none;
  color: var(--text);
  padding: 16px;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  margin-bottom: 8px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.12s;
}
.action-btn:active { background: var(--border); }
.action-btn.danger { color: #f87171; }
.action-btn-cancel {
  width: 100%;
  background: var(--card2);
  border: none;
  color: var(--text2);
  padding: 16px;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  margin-top: 4px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo"><span class="logo-dot">●</span> REPÉRAGE</div>
  <div style="display:flex;gap:8px">
    <button class="header-btn blue" onclick="genFilmReport()">🎬 FILM</button><button class="header-btn" style="background:#1a8a4a;margin-left:6px" onclick="openMapDecors()">🗺️</button>
    <button class="header-btn" onclick="genReport()">⬇ RAPPORT</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <!-- SCREEN: LISTE DÉCORS -->
  <div class="screen active" id="screen-decors">
    <div id="decors-list-content"></div>
  </div>

  <!-- SCREEN: DÉCOR (contacts + rubriques) -->
  <div class="screen" id="screen-decor">
    <div id="decor-content"></div>
  </div>

  <!-- SCREEN: SOUS-DÉCOR (rubriques) -->
  <div class="screen" id="screen-sous">
    <div id="sous-content"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="nav-bottom">
  <button class="nav-tab active" id="nav-decors" onclick="goScreen('decors')">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Décors</span>
  </button>
  <button class="nav-tab" id="nav-decor" onclick="goScreen('decor')" style="display:none">
    <span class="nav-icon">📍</span>
    <span class="nav-label" id="nav-decor-label">Décor</span>
  </button>
  <button class="nav-tab" id="nav-sous" onclick="goScreen('sous')" style="display:none">
    <span class="nav-icon">📂</span>
    <span class="nav-label" id="nav-sous-label">Sous-décor</span>
  </button>
</nav>

<!-- MODAL: SAISIE NOM (décor ou sous-décor) -->
<div class="modal-overlay" id="modal-nom">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-nom-title">NOUVEAU DÉCOR</div>
    <div class="modal-sub" id="modal-nom-sub">Dictez ou tapez le nom</div>
    <div class="field-wrap">
      <input type="text" id="modal-nom-input" placeholder="Nom…" maxlength="80" autocomplete="off">
      <button class="mic-btn" id="modal-nom-mic" onclick="micInput('modal-nom-input','modal-nom-mic')">🎙️</button>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('modal-nom')">Annuler</button>
      <button class="modal-ok" id="modal-nom-ok">Créer</button>
    </div>
  </div>
</div>

<!-- ACTION SHEET: options décor/sous-décor -->
<div class="action-sheet" id="action-sheet">
  <div class="action-sheet-bg" onclick="closeActionSheet()"></div>
  <div class="action-sheet-content">
    <div class="action-sheet-title" id="as-title">OPTIONS</div>
    <div id="as-buttons"></div>
    <button class="action-btn-cancel" onclick="closeActionSheet()">Annuler</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   CONFIGURATION
═══════════════════════════════════════════════ */
const API_KEY = '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';

const RUBRIQUES = [
  { id:'stat',  icon:'🚛', label:'Stationnement' },
  { id:'acces', icon:'🔑', label:'Accès' },
  { id:'elec',  icon:'⚡', label:'Électricité', special:'elec' },
  { id:'prot',  icon:'🛡️', label:'Protection' },
  { id:'lum',   icon:'💡', label:'Lumière' },
  { id:'mach',  icon:'🎥', label:'Machinerie' },
  { id:'deco',  icon:'🎨', label:'Déco' },
  { id:'mob',   icon:'🚧', label:'Mobilier urbain' },
  { id:'circ',  icon:'🚦', label:'Circulation' },
  { id:'cant',  icon:'🍽️', label:'Cantine' },
  { id:'loges', icon:'🚪', label:'Loges', special:'loges' },
  { id:'prod',  icon:'🎬', label:'Production' },
  { id:'dech',  icon:'🗑️', label:'Déchets' },
  { id:'soc',   icon:'🏗️', label:'Société ext.' },
  { id:'nac',   icon:'🦺', label:'Nacelle' },
  { id:'div',   icon:'📦', label:'Divers' },
];

/* ═══════════════════════════════════════════════
   ÉTAT
═══════════════════════════════════════════════ */
let DB = { decors: [] };
let state = { decorId: null, sousId: null, rubrique: 'stat' };
let curPhoto = null; // photo en cours de saisie
let micRecorder = null, isRecording = false, recSec = 0, recTimer = null;
let synthCache = {};
let modalNomCallback = null;
let actionSheetTarget = null;

/* ═══════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════ */
function dbSave() { try { localStorage.setItem('rep_v1', JSON.stringify(DB)); } catch(e) {} }
function dbLoad() { try { const s = localStorage.getItem('rep_v1'); if (s) DB = JSON.parse(s); } catch(e) {} }

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getRub(id) { return RUBRIQUES.find(r => r.id === id); }
function getDecor(id) { return DB.decors.find(d => d.id === id); }
function getSous(decorId, sousId) {
  const d = getDecor(decorId);
  return d ? d.sous.find(s => s.id === sousId) : null;
}
function getActif() {
  if (!state.decorId) return null;
  if (state.sousId) return getSous(state.decorId, state.sousId);
  return getDecor(state.decorId);
}
function initTabData() {
  const td = {};
  RUBRIQUES.forEach(r => {
    if (r.special === 'elec') td[r.id] = { mode:'', puissance:'', obs:[] };
    else if (r.special === 'loges') td[r.id] = { lieu:'', contact:'', tel:'', mail:'', acces:'', elecMode:'', prot:'', obs:[] };
    else td[r.id] = { obs:[] };
  });
  return td;
}
function countObs(entity) {
  if (!entity?.tabData) return 0;
  return RUBRIQUES.reduce((a,r) => a + (entity.tabData[r.id]?.obs?.length||0), 0);
}
function totalDecor(d) {
  return countObs(d) + d.sous.reduce((a,s) => a + countObs(s), 0);
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  // Render content
  if (name === 'decors') renderDecors();
  else if (name === 'decor') renderDecor();
  else if (name === 'sous') renderSous();
  // Scroll top
  document.getElementById('main').scrollTop = 0;
}

function showNavTab(id, label) {
  const tab = document.getElementById('nav-' + id);
  tab.style.display = '';
  if (label) document.getElementById('nav-' + id + '-label').textContent = label.substring(0, 10);
}
function hideNavTab(id) {
  document.getElementById('nav-' + id).style.display = 'none';
}

/* ═══════════════════════════════════════════════
   SCREEN: DÉCORS
═══════════════════════════════════════════════ */
function renderDecors() {
  const el = document.getElementById('decors-list-content');
  if (!DB.decors.length) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎬</div>
        <div class="empty-text">Aucun décor.<br>Commencez par créer votre premier décor.</div>
      </div>
      <button class="btn-big" onclick="openModalDecor()">+ Nouveau décor</button>`;
    return;
  }

  let html = `<button class="btn-big" onclick="openModalDecor()">+ Nouveau décor</button>`;
  html += `<div class="section-title">Mes décors (${DB.decors.length})</div>`;
  html += `<div class="card">`;

  DB.decors.forEach((d, idx) => {
    const total = totalDecor(d);
    const sousTxt = d.sous.length ? `${d.sous.length} sous-décor${d.sous.length>1?'s':''}` : 'Pas de sous-décor';
    html += `
      <div class="card-row" onclick="selectDecor('${d.id}')">
        <span class="card-icon">📍</span>
        <div class="card-text">
          <div class="card-name">${esc(d.nom)}</div>
          <div class="card-sub">${sousTxt}${total ? ` · ${total} obs.` : ''}</div>
        </div>
        ${total ? `<span class="card-badge">${total}</span>` : ''}
        <button class="card-arrow" onclick="event.stopPropagation();openDecorActions('${d.id}',${idx})">⋮</button>
      </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

function selectDecor(id) {
  state.decorId = id;
  state.sousId = null;
  state.rubrique = 'stat';
  const d = getDecor(id);
  showNavTab('decor', d.nom);
  hideNavTab('sous');
  goScreen('decor');
}

function openDecorActions(id, idx) {
  const d = getDecor(id);
  actionSheetTarget = id;
  document.getElementById('as-title').textContent = d.nom.toUpperCase();
  const btns = document.getElementById('as-buttons');
  btns.innerHTML = `
    ${idx > 0 ? `<button class="action-btn" onclick="moveDecor('${id}',-1)">↑ &nbsp;Monter dans la liste</button>` : ''}
    ${idx < DB.decors.length-1 ? `<button class="action-btn" onclick="moveDecor('${id}',1)">↓ &nbsp;Descendre dans la liste</button>` : ''}
    <button class="action-btn" onclick="renommerDecor('${id}')">✏️ &nbsp;Renommer</button>
    <button class="action-btn danger" onclick="supprimerDecor('${id}')">🗑️ &nbsp;Supprimer ce décor</button>`;
  document.getElementById('action-sheet').classList.add('show');
}

function moveDecor(id, dir) {
  closeActionSheet();
  const idx = DB.decors.findIndex(d => d.id === id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= DB.decors.length) return;
  [DB.decors[idx], DB.decors[newIdx]] = [DB.decors[newIdx], DB.decors[idx]];
  dbSave(); renderDecors(); toast(dir < 0 ? '↑ Décor remonté' : '↓ Décor descendu');
}

function renommerDecor(id) {
  closeActionSheet();
  const d = getDecor(id);
  openModalNom('RENOMMER DÉCOR', d.nom, val => {
    d.nom = val;
    dbSave();
    document.getElementById('nav-decor-label').textContent = val.substring(0,10);
    renderDecors();
    toast('✓ Renommé');
  });
}

function supprimerDecor(id) {
  closeActionSheet();
  const d = getDecor(id);
  if (!confirm(`Supprimer "${d.nom}" et toutes ses observations ?`)) return;
  DB.decors = DB.decors.filter(x => x.id !== id);
  if (state.decorId === id) { state.decorId = null; state.sousId = null; hideNavTab('decor'); hideNavTab('sous'); }
  dbSave(); goScreen('decors'); toast('✓ Décor supprimé');
}

/* ═══════════════════════════════════════════════
   SCREEN: DÉCOR
═══════════════════════════════════════════════ */
function renderDecor() {
  const d = getDecor(state.decorId);
  if (!d) { goScreen('decors'); return; }
  const el = document.getElementById('decor-content');
  let html = '';

  // Breadcrumb
  html += `<div class="breadcrumb"><span class="bc-item current">${esc(d.nom)}</span></div>`;
  html += `<div class="section-title">📍 Adresse</div><div class="card" style="padding:14px 16px;margin-bottom:10px"><div class="field-label" style="margin-bottom:5px">ADRESSE</div><div class="field-wrap" style="margin-bottom:8px"><input type="text" id="inp-addr-${d.id}" placeholder="Rue, numéro…" value="${esc(d.adresse||'')}" oninput="saveDecorAddr('adresse',this.value,'${d.id}')"></div><div style="display:grid;grid-template-columns:1fr 2fr;gap:8px"><div><div class="field-label" style="margin-bottom:5px">CP</div><div class="field-wrap"><input type="text" placeholder="75001" value="${esc(d.codepostal||'')}" oninput="saveDecorAddr('codepostal',this.value,'${d.id}')"></div></div><div><div class="field-label" style="margin-bottom:5px">VILLE</div><div class="field-wrap"><input type="text" placeholder="Paris" value="${esc(d.ville||'')}" oninput="saveDecorAddr('ville',this.value,'${d.id}')"></div></div></div></div>`;

  // Contacts
  html += `<div class="section-title">📇 Contacts</div>`;
  d.contacts.forEach(c => {
    html += `<div class="contact-card">
      <button class="contact-del" onclick="delContact('${d.id}','${c.id}')">✕</button>
      <div class="field-label">NOM / FONCTION</div>
      <div class="field-wrap" style="margin-bottom:8px">
        <input type="text" placeholder="Nom…" value="${esc(c.nom)}" oninput="saveContact('${d.id}','${c.id}','nom',this.value)">
        <button class="mic-btn" onclick="micInline(this, v => { this.previousElementSibling.value=v; saveContact('${d.id}','${c.id}','nom',v); })">🎙️</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <div class="field-label">TÉLÉPHONE</div>
          <div class="field-wrap">
            <input type="tel" placeholder="Tél." value="${esc(c.tel)}" oninput="saveContact('${d.id}','${c.id}','tel',this.value)">
            <button class="mic-btn" onclick="micInline(this, v => { this.previousElementSibling.value=v; saveContact('${d.id}','${c.id}','tel',v); })">🎙️</button>
          </div>
        </div>
        <div>
          <div class="field-label">EMAIL</div>
          <div class="field-wrap">
            <input type="email" placeholder="Email" value="${esc(c.mail)}" oninput="saveContact('${d.id}','${c.id}','mail',this.value)">
            <button class="mic-btn" onclick="micInline(this, v => { this.previousElementSibling.value=v; saveContact('${d.id}','${c.id}','mail',v); })">🎙️</button>
          </div>
        </div>
      </div>
    </div>`;
  });
  html += `<button class="btn-big secondary" onclick="addContact('${d.id}')">+ Ajouter un contact</button>`;

  // Sous-décors
  html += `<div class="section-title">Sous-décors (${d.sous.length})</div>`;
  if (d.sous.length) {
    html += `<div class="card">`;
    d.sous.forEach((s, idx) => {
      const cnt = countObs(s);
      html += `
        <div class="card-row" onclick="selectSous('${s.id}')">
          <span class="card-icon">📂</span>
          <div class="card-text">
            <div class="card-name">${esc(s.nom)}</div>
            <div class="card-sub">${cnt ? cnt+' observation'+(cnt>1?'s':'') : 'Aucune observation'}</div>
          </div>
          ${cnt ? `<span class="card-badge">${cnt}</span>` : ''}
          <button class="card-arrow" onclick="event.stopPropagation();openSousActions('${d.id}','${s.id}',${idx})">⋮</button>
        </div>`;
    });
    html += `</div>`;
  }
  html += `<button class="btn-big secondary" onclick="openModalSous()">+ Nouveau sous-décor</button>`;

  // Rubriques directement dans le décor
  html += `<div class="section-title">Rubriques du décor</div>`;
  html += renderRubriquesZone(d, state.decorId, null);

  el.innerHTML = html;
  // restore synth if exists
  restoreSynth('decor-synth-box', state.decorId+'_direct');
}

function selectSous(sousId) {
  state.sousId = sousId;
  state.rubrique = 'stat';
  const s = getSous(state.decorId, sousId);
  showNavTab('sous', s.nom);
  goScreen('sous');
}

function openSousActions(did, sid, idx) {
  const s = getSous(did, sid);
  const d = getDecor(did);
  document.getElementById('as-title').textContent = s.nom.toUpperCase();
  const btns = document.getElementById('as-buttons');
  btns.innerHTML = `
    ${idx > 0 ? `<button class="action-btn" onclick="moveSous('${did}','${sid}',-1)">↑ &nbsp;Monter</button>` : ''}
    ${idx < d.sous.length-1 ? `<button class="action-btn" onclick="moveSous('${did}','${sid}',1)">↓ &nbsp;Descendre</button>` : ''}
    <button class="action-btn" onclick="renommerSous('${did}','${sid}')">✏️ &nbsp;Renommer</button>
    <button class="action-btn danger" onclick="supprimerSous('${did}','${sid}')">🗑️ &nbsp;Supprimer</button>`;
  document.getElementById('action-sheet').classList.add('show');
}

function moveSous(did, sid, dir) {
  closeActionSheet();
  const d = getDecor(did);
  const idx = d.sous.findIndex(s => s.id === sid);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= d.sous.length) return;
  [d.sous[idx], d.sous[newIdx]] = [d.sous[newIdx], d.sous[idx]];
  dbSave(); renderDecor(); toast(dir < 0 ? '↑ Remonté' : '↓ Descendu');
}

function renommerSous(did, sid) {
  closeActionSheet();
  const s = getSous(did, sid);
  openModalNom('RENOMMER SOUS-DÉCOR', s.nom, val => {
    s.nom = val; dbSave(); renderDecor(); toast('✓ Renommé');
    if (state.sousId === sid) document.getElementById('nav-sous-label').textContent = val.substring(0,10);
  });
}

function supprimerSous(did, sid) {
  closeActionSheet();
  const d = getDecor(did);
  const s = getSous(did, sid);
  if (!confirm(`Supprimer "${s.nom}" ?`)) return;
  d.sous = d.sous.filter(x => x.id !== sid);
  if (state.sousId === sid) { state.sousId = null; hideNavTab('sous'); }
  dbSave(); renderDecor(); toast('✓ Supprimé');
}

/* ═══════════════════════════════════════════════
   SCREEN: SOUS-DÉCOR
═══════════════════════════════════════════════ */
function renderSous() {
  const d = getDecor(state.decorId);
  const s = getSous(state.decorId, state.sousId);
  if (!s) { goScreen('decor'); return; }
  const el = document.getElementById('sous-content');
  let html = `
    <div class="breadcrumb">
      <span class="bc-item" onclick="goScreen('decor')">${esc(d.nom)}</span>
      <span class="bc-sep">›</span>
      <span class="bc-item current">${esc(s.nom)}</span>
    </div>`;
  html += renderRubriquesZone(s, state.decorId, state.sousId);
  el.innerHTML = html;
  restoreSynth('sous-synth-box', state.decorId+state.sousId);
}

/* ═══════════════════════════════════════════════
   RUBRIQUES ZONE (partagé décor + sous-décor)
═══════════════════════════════════════════════ */
function renderRubriquesZone(entity, decorId, sousId) {
  const ctxId = sousId ? decorId+sousId : decorId+'_direct';
  let html = '';

  // Tabs rubriques
  html += `<div class="rubrique-tabs">`;
  RUBRIQUES.forEach(r => {
    const cnt = entity.tabData?.[r.id]?.obs?.length || 0;
    const isActive = state.rubrique === r.id;
    html += `<button class="rubrique-tab ${isActive?'active':''}" onclick="selectRubrique('${r.id}','${decorId}','${sousId||''}')">${r.icon} ${r.label}${cnt>0?` (${cnt})`:''}</button>`;
  });
  html += `</div>`;

  // Synthèse IA
  html += `<button class="btn-big purple" id="${sousId?'sous':'decor'}-synth-btn" onclick="synthEntity('${decorId}','${sousId||''}')">✦ Synthétiser avec l'IA</button>`;
  html += `<div class="synth-box" id="${sousId?'sous':'decor'}-synth-box" style="display:none">
    <div class="synth-head">
      <span class="synth-head-label">✦ Synthèse — Claude</span>
      <button class="synth-close" onclick="document.getElementById('${sousId?'sous':'decor'}-synth-box').style.display='none'">✕</button>
    </div>
    <div class="synth-content" id="${sousId?'sous':'decor'}-synth-content"></div>
  </div>`;

  // Panel rubrique active
  html += renderRubriquePanel(entity, state.rubrique, decorId, sousId);

  return html;
}

function selectRubrique(rubId, decorId, sousId) {
  state.rubrique = rubId;
  if (sousId) renderSous();
  else renderDecor();
  // Scroll to rubrique tabs
  setTimeout(() => {
    const tabs = document.querySelector('.rubrique-tabs');
    if (tabs) tabs.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 50);
}

/* ═══════════════════════════════════════════════
   RUBRIQUE PANEL
═══════════════════════════════════════════════ */
function renderRubriquePanel(entity, rubId, decorId, sousId) {
  const r = getRub(rubId);
  const td = entity.tabData?.[rubId] || { obs:[] };
  const ctxSuffix = sousId ? 'sous' : 'decor';
  let html = `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px">`;
  html += `<div style="font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2.5px;color:var(--orange);margin-bottom:12px">${r.icon} ${r.label.toUpperCase()}</div>`;

  // Champs spéciaux électricité
  if (rubId === 'elec') {
    const modeDirect = td.mode==='direct' || td.mode==='les deux';
    const modeGroupe = td.mode==='groupe' || td.mode==='les deux';
    html += `<div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text3);margin-bottom:7px">ALIMENTATION (sélection multiple possible)</div>
    <div class="choice-row">
      <button class="choice-btn ${modeDirect?'active-green':''}" onclick="toggleElecMode('direct','${decorId}','${sousId||''}')">⚡ Branchement direct</button>
      <button class="choice-btn ${modeGroupe?'active-red':''}" onclick="toggleElecMode('groupe','${decorId}','${sousId||''}')">🔋 Groupe électrogène</button>
    </div>
    <div class="field-label">PUISSANCE DISPONIBLE</div>
    <div class="field-wrap">
      <input type="text" placeholder="Ex: 32A tri, 63A mono…" value="${esc(td.puissance||'')}" oninput="saveElecPuiss(this.value,'${decorId}','${sousId||''}')">
      <button class="mic-btn" onclick="micInline(this, v => { this.previousElementSibling.value=v; saveElecPuiss(v,'${decorId}','${sousId||''}'); })">🎙️</button>
    </div>`;
  }

  // Champs spéciaux loges
  if (rubId === 'loges') {
    html += `
    <div class="field-label">LIEU</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">

    </div>
    <div class="field-label">ACCÈS</div>

  // ZONE CAPTURE: dictée d'abord, photo optionnelle après
  html += `<div id="rec-indicator-${ctxSuffix}" class="rec-indicator">
    <div class="rec-dot"></div>
    <span class="rec-text">DICTÉE EN COURS</span>
    <span class="rec-timer" id="rec-timer-${ctxSuffix}">0:00</span>
  </div>`;
  // 1. Note / dictée en premier
  html += `<div class="field-wrap">
    <textarea id="note-txt-${ctxSuffix}" placeholder="Dictez ou tapez votre observation sur ${r.label.toLowerCase()}…" rows="3"></textarea>
    <button class="mic-btn" id="mic-main-${ctxSuffix}" onclick="toggleMic('${ctxSuffix}')">🎙️</button>
  </div>`;
  // 2. Photo optionnelle
  html += `<div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text3);margin-bottom:7px">PHOTO (optionnelle)</div>`;
  html += `<div class="photo-buttons">
    <label class="photo-btn" for="photo-cam-${ctxSuffix}">
      <span class="photo-icon">📷</span><span>Photo</span>
    </label>
    <input type="file" id="photo-cam-${ctxSuffix}" accept="image/*" capture="environment" onchange="loadPhoto(this,'${ctxSuffix}')">
    <label class="photo-btn" for="photo-gal-${ctxSuffix}">
      <span class="photo-icon">🖼️</span><span>Galerie</span>
    </label>
    <input type="file" id="photo-gal-${ctxSuffix}" accept="image/*" onchange="loadPhoto(this,'${ctxSuffix}')">
  </div>`;
  html += `<div class="photo-preview" id="photo-preview-${ctxSuffix}">
    <img id="photo-img-${ctxSuffix}" src="" alt="">
    <button class="photo-preview-remove" onclick="clearPhoto('${ctxSuffix}')">✕</button>
  </div>`;
  // 3. Bouton ajouter
  html += `<button class="btn-big" onclick="addObs('${rubId}','${decorId}','${sousId||''}','${ctxSuffix}')">＋ Ajouter observation</button>`;

  // Liste observations
  const obs = td.obs || [];
  if (obs.length) {
    html += `<div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text3);margin:12px 0 8px">OBSERVATIONS (${obs.length})</div>`;
    obs.forEach(o => {
      html += `<div class="obs-item">
        ${o.photo ? `<div class="obs-photo"><img src="${o.photo}" alt=""></div>` : ''}
        <div class="obs-body">
          <div class="obs-meta"><span class="obs-num">#${o.num}</span><span class="obs-time">🕐 ${o.heure}</span></div>
          <div class="obs-note">${o.note ? esc(o.note).replace(/\n/g,'<br>') : '<em style="color:var(--text3)">Pas de note</em>'}</div>

            <button class="obs-action-btn edit" onclick="editObs('${rubId}','${o.id}','${decorId}','${sousId||''}')">✏ Modifier</button>
            <button class="obs-action-btn" onclick="delObs('${rubId}','${o.id}','${decorId}','${sousId||''}')">✕ Supprimer</button>
          </div>
        </div>
      </div>`;
    });
  }
  html += `</div>`;
  return html;
}

/* ═══════════════════════════════════════════════
   MICRO PRINCIPAL
═══════════════════════════════════════════════ */
function initMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  micRecorder = new SR();
  micRecorder.lang = 'fr-FR';
  micRecorder.continuous = false;
  micRecorder.interimResults = false;
  let base = '';
  micRecorder.onresult = e => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) base += e.results[i][0].transcript + ' ';
    }
    const ta = document.querySelector('textarea[id^="note-txt"]');
    if (ta) ta.value = base.trim();
  };
  micRecorder.onerror = () => stopMic();
  micRecorder.onend = () => { if (isRecording) { try { micRecorder.start(); } catch(e){} } };
  micRecorder._reset = () => { base = ''; };
}

function toggleMic(ctxSuffix) {
  if (!micRecorder) { toast('⚠ Utilisez Chrome pour la dictée'); return; }
  isRecording ? stopMic() : startMic(ctxSuffix);
}
function startMic(ctxSuffix) {
  micRecorder._reset();
  const ta = document.getElementById('note-txt-'+ctxSuffix);
  if (ta) { const ex = ta.value.trim(); if (ex) ta.value = ex + ' '; }
  micRecorder.start(); isRecording = true;
  document.getElementById('mic-main-'+ctxSuffix)?.classList.add('recording');
  document.getElementById('rec-indicator-'+ctxSuffix)?.classList.add('on');
  recSec = 0;
  recTimer = setInterval(() => {
    recSec++;
    const m = Math.floor(recSec/60), s = recSec % 60;
    const el = document.getElementById('rec-timer-'+ctxSuffix);
    if (el) el.textContent = m+':'+String(s).padStart(2,'0');
  }, 1000);
}
function stopMic() {
  micRecorder?.stop(); isRecording = false;
  document.querySelectorAll('.mic-btn.recording').forEach(b => b.classList.remove('recording'));
  document.querySelectorAll('.rec-indicator.on').forEach(b => b.classList.remove('on'));
  clearInterval(recTimer);
}

// Micro pour champs inline (contacts, loges, etc.)
function micInline(btn, callback) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('⚠ Chrome requis'); return; }
  const r = new SR(); r.lang = 'fr-FR'; r.continuous = false; r.interimResults = false;
  btn.classList.add('recording');
  r.onresult = e => { if (e.results[0]?.isFinal) callback(e.results[0][0].transcript); };
  r.onend = () => btn.classList.remove('recording');
  r.onerror = () => btn.classList.remove('recording');
  r.start();
}

// Micro pour champs input dans modals
let modalMicRec = null;
function micInput(inputId, btnId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('⚠ Chrome requis'); return; }
  if (modalMicRec) { try { modalMicRec.stop(); } catch(e){} }
  modalMicRec = new SR(); modalMicRec.lang = 'fr-FR'; modalMicRec.continuous = false; modalMicRec.interimResults = false;
  const btn = document.getElementById(btnId);
  btn.classList.add('recording');
  modalMicRec.onresult = e => { if (e.results[0]?.isFinal) document.getElementById(inputId).value = e.results[0][0].transcript; };
  modalMicRec.onend = () => btn.classList.remove('recording');
  modalMicRec.onerror = () => btn.classList.remove('recording');
  modalMicRec.start();
}

function addObs(rubId, decorId, sousId, ctxSuffix) {
  const entity = getEntityByCtx(decorId, sousId||null);
  if (!entity) return;
  const ta = document.getElementById('note-txt-'+ctxSuffix);
  const note = ta ? ta.value.trim() : '';
  const photo = curPhoto;
  if (!note && !photo) { toast('⚠ Ajoutez une photo ou une note'); return; }
  if (isRecording) stopMic();
  const now = new Date();
  if (!entity.tabData[rubId]) entity.tabData[rubId] = { obs:[] };
  entity.tabData[rubId].obs.unshift({
    id: uid(),
    photo,
    note,
    heure: now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }),
    num: entity.tabData[rubId].obs.length + 1
  });
  dbSave();
  curPhoto = null;
  if (ta) ta.value = '';
  renderScreen();
  toast('✓ Observation ajoutée');
}

function editObs(rubId, obsId, decorId, sousId) {
  const entity = getEntityByCtx(decorId, sousId||null);
  if (!entity) return;
  const o = entity.tabData[rubId].obs.find(x => x.id === obsId);
  if (!o) return;

  // Show action sheet with options
  document.getElementById('as-title').textContent = 'MODIFIER OBSERVATION #' + o.num;
  const btns = document.getElementById('as-buttons');
  btns.innerHTML = `
    <button class="action-btn" onclick="editObsNote('${rubId}','${obsId}','${decorId}','${sousId||''}')">✏️ &nbsp;Modifier la note</button>
    <button class="action-btn" onclick="editObsPhoto('${rubId}','${obsId}','${decorId}','${sousId||''}')">📷 &nbsp;${o.photo ? 'Changer la photo' : 'Ajouter une photo'}</button>
    ${o.photo ? `<button class="action-btn danger" onclick="editObsRemovePhoto('${rubId}','${obsId}','${decorId}','${sousId||''}')">🗑️ &nbsp;Supprimer la photo</button>` : ''}`;
  document.getElementById('action-sheet').classList.add('show');
}

function editObsNote(rubId, obsId, decorId, sousId) {
  closeActionSheet();
  const entity = getEntityByCtx(decorId, sousId||null);
  if (!entity) return;
  const o = entity.tabData[rubId].obs.find(x => x.id === obsId);
  if (!o) return;
  const n = prompt('Modifier la note :', o.note);
  if (n === null) return;

function editObsPhoto(rubId, obsId, decorId, sousId) {
  closeActionSheet();
  // Create a temporary file input
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      const entity = getEntityByCtx(decorId, sousId||null);
      if (!entity) return;
      const o = entity.tabData[rubId].obs.find(x => x.id === obsId);
      if (o) { o.photo = ev.target.result; dbSave(); renderScreen(); toast('✓ Photo mise à jour'); }
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

function editObsRemovePhoto(rubId, obsId, decorId, sousId) {
  closeActionSheet();
  const entity = getEntityByCtx(decorId, sousId||null);
  if (!entity) return;
  const o = entity.tabData[rubId].obs.find(x => x.id === obsId);
  if (o) { o.photo = null; dbSave(); renderScreen(); toast('✓ Photo supprimée'); }
}

function delObs(rubId, obsId, decorId, sousId) {
  const entity = getEntityByCtx(decorId, sousId||null);
  if (!entity || !confirm('Supprimer cette observation ?')) return;
  entity.tabData[rubId].obs = entity.tabData[rubId].obs.filter(x => x.id !== obsId);

/* ═══════════════════════════════════════════════
   SYNTHÈSE IA
═══════════════════════════════════════════════ */
async function callClaude(prompt) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1200,
      messages: [{ role:'user', content:prompt }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.map(c => c.text||'').join('') || '';
}

function collectEntityNotes(entity, nom, decorNom) {
  let txt = `REPÉRAGE — ${decorNom}${nom !== decorNom ? ' / '+nom : ''}\n${'─'.repeat(40)}\n`;
  RUBRIQUES.forEach(r => {
    const td = entity.tabData?.[r.id];
    const obs = td?.obs || [];
    if (r.id === 'elec' && td?.mode) {
      txt += `\n⚡ ÉLECTRICITÉ\nMode: ${td.mode === 'direct' ? 'Branchement direct' : 'Groupe électrogène autonome'}\n`;
      if (td.puissance) txt += `Puissance: ${td.puissance}\n`;
    }
    if (r.id === 'loges' && (td?.lieu || td?.contact)) {
      txt += `\n🚪 LOGES\n`;
      if (td.lieu) txt += `Lieu: ${td.lieu}\n`;
      if (td.contact) txt += `Contact: ${td.contact}${td.tel?' — '+td.tel:''}\n`;
      if (td.acces) txt += `Accès: ${td.acces}\n`;
      if (td.elecMode) txt += `Élec: ${td.elecMode === 'direct' ? 'Direct' : 'Groupe autonome'}\n`;
    }
    if (obs.length) {
      txt += `\n${r.icon} ${r.label.toUpperCase()}\n`;
      obs.forEach(o => { if (o.note) txt += `• ${o.note}\n`; });
    }
  });
  return txt;
}

async function synthEntity(decorId, sousId) {
  const entity = getEntityByCtx(decorId, sousId||null);
  const d = getDecor(decorId);
  const nom = sousId ? getSous(decorId, sousId)?.nom : d.nom;
  if (!entity) return;

  const notes = collectEntityNotes(entity, nom, d.nom);
  if (notes.split('\n').length < 4) { toast('⚠ Pas assez de notes'); return; }

  const boxId = (sousId ? 'sous' : 'decor') + '-synth-box';
  const contentId = (sousId ? 'sous' : 'decor') + '-synth-content';
  const btnId = (sousId ? 'sous' : 'decor') + '-synth-btn';
  const cacheKey = sousId ? decorId+sousId : decorId+'_direct';

  const box = document.getElementById(boxId);
  const content = document.getElementById(contentId);
  const btn = document.getElementById(btnId);
  if (!box || !content) return;

  btn.disabled = true;
  box.style.display = '';
  content.innerHTML = `<div class="synth-loading">ANALYSE EN COURS <span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;

  try {
    const txt = await callClaude(
      `Tu es régisseur de cinéma professionnel. Synthétise ces notes de repérage en compte rendu professionnel clair et structuré. Utilise le vocabulaire technique du cinéma. Reformule en phrases complètes. Termine par une liste "Points d'attention".\n\n${notes}`
    );
    content.innerHTML = mdToHtml(txt);
    synthCache[cacheKey] = txt;
  } catch(e) {
    content.innerHTML = `<div style="color:#f87171">Erreur: ${esc(e.message)}</div>`;
  }
  btn.disabled = false;
}

/* ═══════════════════════════════════════════════
   MARKDOWN → HTML
═══════════════════════════════════════════════ */
function mdToHtml(txt) {
  if (!txt) return '';
  return txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>')
    .replace(/(<li>[\s\S]+?<\/li>)/g,'<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g,'')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<[hpul])(.+)$/gm,'<p>$1</p>')
    .replace(/<p><\/p>/g,'')
    .replace(/<p>(<[hul])/g,'$1')
    .replace(/(<\/[hul][^>]*>)<\/p>/g,'$1');
}

function buildReportHTML(titre, decors, withAISynth) {

  const totalObs = decors.reduce((a,d) => {
    return a + countObs(d) + d.sous.reduce((b,s) => b + countObs(s), 0);
  }, 0);

  let h = `<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><title>${titre}</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;color:#111;max-width:900px;margin:0 auto;padding:36px 28px;background:#fff;}
.cover{border-bottom:4px solid #e05c14;padding-bottom:22px;margin-bottom:28px;}
.cvt{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:6px;color:#080808;}
.cvs{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#e05c14;margin-top:4px;}
.cvd{font-family:'DM Mono',monospace;font-size:11px;color:#999;text-transform:uppercase;margin-top:8px;letter-spacing:1.5px;}
.stats{display:flex;gap:14px;margin-top:16px;flex-wrap:wrap;}
.stat{background:#f4f2ee;padding:8px 16px;border-radius:5px;}
.stn{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#e05c14;line-height:1;}
.stl{font-size:10px;color:#999;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.toc{background:#f8f6f2;border-radius:6px;padding:16px 20px;margin-bottom:32px;}
.toc-t{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:#999;margin-bottom:10px;}
.toc-d{font-size:13px;font-weight:600;color:#111;margin:8px 0 3px;}
.toc-s{font-size:11px;color:#666;padding-left:14px;margin-bottom:2px;}
.toc-s::before{content:'↳ ';color:#e05c14;}
.dsec{margin-bottom:44px;}
.dsec+.dsec{page-break-before:always;}
.dband{background:#080808;color:#fff;padding:12px 18px;border-radius:5px 5px 0 0;display:flex;justify-content:space-between;align-items:center;}
.dband-n{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}
.dband-c{font-family:'DM Mono',monospace;font-size:10px;color:#aaa;}
.contacts-blk{border:1px solid #e0ddd5;border-top:none;padding:12px 16px;background:#fafaf8;}
.contacts-t{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:#888;margin-bottom:8px;}
.contact-r{font-size:12px;color:#333;margin-bottom:4px;}
.synth-blk{background:#f0eeff;border-left:3px solid #7c3aed;padding:14px 16px;margin:12px 0;border-radius:0 5px 5px 0;font-size:13px;line-height:1.75;color:#111;}
.synth-blk h1,.synth-blk h2,.synth-blk h3{font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;color:#5b21b6;margin:10px 0 5px;}
.synth-blk strong{font-weight:700;} .synth-blk ul{padding-left:16px;margin:5px 0;} .synth-blk li{margin-bottom:3px;} .synth-blk p{margin-bottom:8px;}
.synth-t{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:#7c3aed;margin-bottom:8px;}
.ssec{border:1px solid #e0ddd5;border-top:none;}
.ssec:last-child{border-radius:0 0 5px 5px;}
.shd{background:#f0ede6;padding:9px 16px;border-bottom:1px solid #e0ddd5;display:flex;align-items:center;gap:10px;}
.shd-n{font-size:13px;font-weight:600;color:#333;flex:1;}
.shd-b{background:#e05c14;color:#fff;font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:10px;}
.tab-blk{padding:12px 16px;border-bottom:1px solid #f0ede6;}
.tab-blk:last-child{border-bottom:none;}
.tab-n{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:#e05c14;margin-bottom:8px;}
.elec-b{background:#e05c14;color:#fff;font-size:10px;padding:2px 8px;border-radius:3px;font-family:'DM Mono',monospace;display:inline-block;margin-bottom:6px;}
.elec-b.grp{background:#b03020;}
.obs{border:1px solid #eae8e2;border-radius:5px;overflow:hidden;margin-bottom:10px;break-inside:avoid;}
.obs-img img{width:100%;max-height:360px;object-fit:contain;background:#f0f0f0;display:block;}
.obs-body{padding:10px 13px;}
.obs-meta{display:flex;gap:8px;margin-bottom:5px;}
.obs-n{font-family:'Bebas Neue',sans-serif;font-size:14px;color:#e05c14;}
.obs-t{font-family:'DM Mono',monospace;font-size:9px;color:#bbb;}
.obs-note{font-size:13px;line-height:1.65;color:#222;white-space:pre-wrap;}
.pied{border-top:1px solid #e0ddd5;margin-top:36px;padding-top:14px;display:flex;justify-content:space-between;}
.pied-l{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;letter-spacing:1px;}
.pied-r{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:#e05c14;}
@media print{body{padding:16px;}.dsec+.dsec{page-break-before:always;}}
.print-note{background:#fff3cd;border:1px solid #ffc107;border-radius:5px;padding:10px 14px;margin-bottom:20px;font-size:12px;color:#856404;}
</style></head><body>`;

  // Note d'impression
  h += `<div class="print-note">📄 Pour sauvegarder en PDF : Menu du navigateur → <strong>Imprimer</strong> → <strong>Enregistrer en PDF</strong></div>`;

  // Couverture
  const nbD = decors.length;
  const nbS = decors.reduce((a,d) => a+d.sous.length, 0);
  h += `<div class="cover">
<div class="cvt">${titre}</div>
<div class="cvs">REPÉRAGE TECHNIQUE</div>
<div class="cvd">${date}</div>
<div class="stats">
<div class="stat"><div class="stn">${nbD}</div><div class="stl">Décor${nbD>1?'s':''}</div></div>
<div class="stat"><div class="stn">${nbS}</div><div class="stl">Sous-décor${nbS>1?'s':''}</div></div>
<div class="stat"><div class="stn">${totalObs}</div><div class="stl">Observation${totalObs>1?'s':''}</div></div>
</div></div>`;

  // Sommaire
  h += `<div class="toc"><div class="toc-t">SOMMAIRE</div>`;
  decors.forEach(d => {
    h += `<div class="toc-d">${esc(d.nom)}</div>`;
    d.sous.forEach(s => { h += `<div class="toc-s">${esc(s.nom)}</div>`; });
  });
  h += `</div>`;

  // Fonction pour rendre une section
  function renderSec(entity, nom, cacheKey) {
    let out = '';
    if (withAISynth && synthCache[cacheKey]) {
      out += `<div class="synth-blk"><div class="synth-t">✦ SYNTHÈSE IA — CLAUDE</div>${mdToHtml(synthCache[cacheKey])}</div>`;
    }
    RUBRIQUES.forEach(r => {
      const td = entity.tabData?.[r.id];
      const obs = td?.obs || [];
      const hasSpec = (r.id==='elec' && (td?.mode||td?.puissance)) || (r.id==='loges' && (td?.lieu||td?.contact));
      if (!obs.length && !hasSpec) return;
      out += `<div class="tab-blk"><div class="tab-n">${r.icon} ${r.label.toUpperCase()}</div>`;
      if (r.id==='elec' && td?.mode) {
        out += `<div class="elec-b ${td.mode==='groupe'?'grp':''}">${td.mode==='direct'?'⚡ Branchement direct':td.mode==='groupe'?'🔋 Groupe électrogène':'⚡🔋 Direct + Groupe électrogène'}</div>`;
        if (td.puissance) out += `<div style="font-size:12px;color:#555;margin-bottom:6px">Puissance : ${esc(td.puissance)}</div>`;
      }
      if (r.id==='loges' && td) {
        if (td.lieu) out += `<div style="font-size:12px;color:#555;margin-bottom:4px">📍 ${esc(td.lieu)}</div>`;
        if (td.contact) out += `<div style="font-size:12px;color:#555;margin-bottom:4px">👤 ${esc(td.contact)}${td.tel?' — 📞 '+esc(td.tel):''}</div>`;
        if (td.acces) out += `<div style="font-size:12px;color:#555;margin-bottom:6px">🔑 ${esc(td.acces)}</div>`;
      }
      [...obs].reverse().forEach(o => {
        out += `<div class="obs">
${o.photo ? `<div class="obs-img"><img src="${o.photo}" alt=""></div>` : ''}
<div class="obs-body"><div class="obs-meta"><span class="obs-n">OBS.#${o.num}</span><span class="obs-t">🕐 ${o.heure}</span></div>
<div class="obs-note">${o.note||'(Sans note)'}</div></div></div>`;
      });
      out += `</div>`;
    });
    return out;
  }

  // Corps
  decors.forEach(d => {
    const tot = totalDecor(d);
    h += `<div class="dsec"><div class="dband"><span class="dband-n">${esc(d.nom)}</span><span class="dband-c">${tot} obs.</span></div>`;
    if (d.contacts?.length) {
      h += `<div class="contacts-blk"><div class="contacts-t">📇 CONTACTS</div>`;
      d.contacts.forEach(c => { h += `<div class="contact-r"><strong>${esc(c.nom)}</strong>${c.tel?' — 📞 '+esc(c.tel):''}${c.mail?' — ✉ '+esc(c.mail):''}</div>`; });
      h += `</div>`;
    }
    // Rubriques niveau décor
    const secD = renderSec(d, d.nom, d.id+'_direct');
    if (secD) h += `<div class="ssec"><div class="shd"><span class="shd-n">📋 Général — ${esc(d.nom)}</span></div>${secD}</div>`;
    // Sous-décors
    d.sous.forEach(s => {
      const cnt = countObs(s);
      const sec = renderSec(s, s.nom, d.id+s.id);
      if (sec || cnt) h += `<div class="ssec"><div class="shd"><span class="shd-n">↳ ${esc(s.nom)}</span><span class="shd-b">${cnt} obs.</span></div>${sec}</div>`;
    });
    h += `</div>`;
  });

  h += `<div class="pied"><span class="pied-l">Généré le ${date}</span><span class="pied-r">● REPÉRAGE PRO</span></div>`;
  h += `</body></html>`;
  return h;
}

function openReport(html) {
  const w = window.open('', '_blank');
  if (w) { w.document.write(html); w.document.close(); }
  else toast('⚠ Autorisez les popups dans Chrome');
}

function openMapDecors(){
  var dd=DB.decors.filter(function(d){return d.adresse||d.ville;});
  if(!dd.length){toast('Ajoutez des adresses dans vos décors');return;}
  var q=encodeURIComponent([dd[0].adresse,dd[0].codepostal,dd[0].ville].filter(Boolean).join(' '));
  window.open('https://www.google.com/maps/search/?api=1&query='+q,'_blank');
  if(dd.length>1) toast(dd.length+' décors — carte du 1er décor ouverte');
}

function genReport() {
  if (!state.decorId) {
    // Rapport de tous les décors
    if (!DB.decors.length) { toast('⚠ Aucun décor'); return; }
    openReport(buildReportHTML('RAPPORT DE REPÉRAGE', DB.decors, true));
  } else {
    // Rapport du décor actif seulement
    const d = getDecor(state.decorId);
    openReport(buildReportHTML('RAPPORT — ' + d.nom.toUpperCase(), [d], true));
  }
  toast('✓ Rapport ouvert — imprimer pour PDF');
}

async function genFilmReport() {
  if (!DB.decors.length) { toast('⚠ Aucun décor'); return; }
  toast('Génération synthèses IA…');

  // Générer toutes les synthèses manquantes
  for (const d of DB.decors) {
    const keyD = d.id+'_direct';
    if (!synthCache[keyD]) {
      const notes = collectEntityNotes(d, d.nom, d.nom);
      if (notes.split('\n').length > 4) {
        try { synthCache[keyD] = await callClaude(`Synthèse repérage cinéma, compte rendu professionnel structuré, points d'attention.\n\n${notes}`); } catch(e){}
      }
    }
    for (const s of d.sous) {
      const keyS = d.id+s.id;
      if (!synthCache[keyS]) {
        const notes = collectEntityNotes(s, s.nom, d.nom);
        if (notes.split('\n').length > 4) {
          try { synthCache[keyS] = await callClaude(`Synthèse repérage cinéma, compte rendu professionnel structuré, points d'attention.\n\n${notes}`); } catch(e){}
        }
      }
    }
  }

  // Résumé exécutif global
  let globalNotes = 'DOSSIER FILM COMPLET\n\n';
  DB.decors.forEach(d => {
    globalNotes += `DÉCOR: ${d.nom}\n`;
    RUBRIQUES.forEach(r => {
      const obs = d.tabData?.[r.id]?.obs || [];
      if (obs.length) globalNotes += `${r.label}: ${obs.map(o=>o.note).filter(Boolean).join(' / ')}\n`;
    });
    d.sous.forEach(s => {
      globalNotes += `  Sous-décor ${s.nom}: `;
      const notes = [];
      RUBRIQUES.forEach(r => { s.tabData[r.id]?.obs?.forEach(o => { if(o.note) notes.push(o.note); }); });
      globalNotes += notes.slice(0,3).join(' / ') + '\n';
    });
    globalNotes += '\n';
  });

  let resumeGlobal = '';
  try {
    resumeGlobal = await callClaude(`Tu es régisseur de cinéma. Rédige un résumé exécutif global de ce repérage pour présentation à la production. Synthétise les points clés par décor, les contraintes majeures, les besoins logistiques. Format professionnel court (max 1 page).\n\n${globalNotes}`);
  } catch(e) { resumeGlobal = ''; }

  const baseHTML = buildReportHTML('DOSSIER DE REPÉRAGE — FILM COMPLET', DB.decors, true);
  // Insert résumé exécutif after cover
  const withResume = baseHTML.replace(
    '<div class="toc">',
    `<div style="background:#fff8f0;border:2px solid #e05c14;border-radius:8px;padding:20px;margin-bottom:28px">
<div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:#e05c14;margin-bottom:12px">✦ RÉSUMÉ EXÉCUTIF</div>
<div style="font-size:13px;line-height:1.75">${mdToHtml(resumeGlobal)}</div>
</div><div class="toc">`
  );
  openReport(withResume);
  toast('✓ Dossier film complet généré !');
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
dbLoad();
initMic();
renderDecors();
</script>
