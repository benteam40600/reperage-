<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Repérage Pro">
<meta name="theme-color" content="#e05c14">
<title>Repérage Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#161616;--card2:#1e1e1e;--border:#2a2a2a;--border2:#383838;--text:#ede9e0;--text2:#9a9590;--text3:#5a5650;--orange:#e05c14;--orange2:#f07030;--red:#c0392b;--green:#1e8a4a;--blue:#1a5fa0;--purple:#7c3aed;--purplebg:rgba(124,58,237,0.12)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:0 14px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--text);display:flex;align-items:center;gap:8px;cursor:pointer}
.logo span{color:var(--orange)}
.hbtns{display:flex;gap:6px}
.hbtn{background:var(--orange);color:white;border:none;padding:7px 11px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:opacity .15s}
.hbtn:active{opacity:.75}
.hbtn.bl{background:var(--blue)}
.hbtn.gr{background:var(--green)}

/* NAV */
.nav{background:var(--card);border-top:1px solid var(--border);display:flex;flex-shrink:0;z-index:10}
.ntab{flex:1;background:none;border:none;color:var(--text3);padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;font-family:'DM Sans',sans-serif}
.ntab.on{color:var(--orange)}
.ntab .ni{font-size:22px;line-height:1}
.ntab .nl{font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scr{display:none;padding:14px}
.scr.on{display:block}

/* SECTION TITLE */
.st{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;margin-top:18px}
.st:first-child{margin-top:0}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.crow{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;transition:background .12s;user-select:none}
.crow:active{background:var(--card2)}
.crow+.crow{border-top:1px solid var(--border)}
.ci{font-size:20px;flex-shrink:0}
.ct{flex:1;min-width:0}
.cn{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{font-size:11px;color:var(--text3);margin-top:2px}
.cbadge{background:var(--orange);color:white;font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;flex-shrink:0}
.cmore{color:var(--text3);font-size:18px;flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px 30px}
.empty .ei{font-size:48px;margin-bottom:16px}
.empty .et{color:var(--text3);font-size:14px;line-height:1.6}

/* BIG BTN */
.bbtn{width:100%;background:var(--orange);color:white;border:none;border-radius:10px;padding:16px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:opacity .12s}
.bbtn:active{opacity:.8}
.bbtn.sec{background:var(--card);color:var(--text2);border:1px dashed var(--border2)}
.bbtn.pur{background:var(--purplebg);color:#c4b5fd;border:1px solid var(--purple)}

/* FIELD */
.flbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.fw{background:var(--card2);border:1px solid var(--border2);border-radius:8px;display:flex;align-items:center;padding:12px 14px;gap:10px;margin-bottom:10px}
.fw:focus-within{border-color:var(--orange)}
.fw input,.fw textarea{background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;flex:1;min-width:0;outline:none;resize:none;line-height:1.5}
.fw input::placeholder,.fw textarea::placeholder{color:var(--text3);font-style:italic}
.mic{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:2px;flex-shrink:0;line-height:1}
.mic.rec{color:var(--red);animation:pl .8s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}

/* REC */
.reci{display:none;align-items:center;gap:8px;background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:8px 12px;margin-bottom:10px}
.reci.on{display:flex}
.recdot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pl .8s infinite;flex-shrink:0}
.rectxt{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:1px;flex:1}
.rectmr{font-family:'DM Mono',monospace;font-size:12px;color:var(--red)}

/* PHOTO */
.pbts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pbtn{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:14px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text2);transition:all .12s}
.pbtn:active{border-color:var(--orange)}
.pbtn .pi{font-size:24px}
input[type=file]{display:none}
.pprev{display:none;position:relative;border-radius:8px;overflow:hidden;margin-bottom:10px;background:var(--card2)}
.pprev.on{display:block}
.pprev img{width:100%;max-height:220px;object-fit:contain;display:block}
.pdel{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:white;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* OBS */
.obsitem{background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.obsimg img{width:100%;max-height:180px;object-fit:contain;background:#111;display:block}
.obsbody{padding:10px 12px}
.obsmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.obsnum{font-family:'DM Mono',monospace;font-size:10px;color:var(--orange);letter-spacing:1px}
.obstm{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}
.obsnote{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.obsdel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 0 0 8px}

/* TABS */
.rtabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.rtabs::-webkit-scrollbar{display:none}
.rtab{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .12s;display:flex;align-items:center;gap:4px}
.rtab.on{background:var(--orange);border-color:var(--orange);color:white}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.bci{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;cursor:pointer}
.bci:hover{color:var(--text2)}
.bci.cur{color:var(--text);cursor:default}
.bcsep{color:var(--text3);font-size:12px}

/* CONTACT */
.ccard{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px;position:relative}
.cdel{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px}

/* ELEC */
.emodes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.emode{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--text2);text-align:center;transition:all .12s}
.emode.on{border-color:var(--orange);color:var(--orange);background:rgba(224,92,20,.08)}

/* SYNTH */
.sbox{background:var(--purplebg);border:1px solid var(--purple);border-radius:10px;padding:14px;margin-bottom:14px}
.stitle{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:#a78bfa;margin-bottom:8px}
.stext{font-size:13px;color:var(--text2);line-height:1.7}
.stext p{margin-bottom:8px}
.stext strong{color:var(--text)}

/* MODAL */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end}
.mover.on{display:flex}
.msheet{background:var(--card);border-radius:16px 16px 0 0;padding:20px 20px 36px;width:100%}
.mhandle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin-bottom:4px}
.msub{font-size:12px;color:var(--text3);margin-bottom:14px}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.mcancel{background:var(--card2);color:var(--text2);border:1px solid var(--border2);border-radius:8px;padding:12px;font-size:14px;cursor:pointer}
.mok{background:var(--orange);color:white;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer}

/* ACTION SHEET */
.ash{position:fixed;inset:0;z-index:100;display:none}
.ash.on{display:block}
.ashbg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.ashc{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-radius:16px 16px 0 0;padding:16px 16px 36px}
.ashtitle{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text3);text-align:center;margin-bottom:14px}
.abtn{display:block;width:100%;background:var(--card2);border:none;border-radius:8px;padding:14px 16px;color:var(--text);font-size:14px;cursor:pointer;text-align:left;margin-bottom:8px}
.abtn:active{opacity:.7}
.abtn.danger{color:var(--red)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1}

/* ADDR */
.agrid{display:grid;grid-template-columns:1fr 2fr;gap:8px}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo" onclick="goHome()"><span>●</span> REPÉRAGE</div>
  <div class="hbtns">
    <button class="hbtn bl" onclick="genFilmReport()">🎬 FILM</button>
    <button class="hbtn gr" onclick="openMap()">🗺️</button>
    <button class="hbtn" onclick="genReport()">⬇ RAPPORT</button>
  </div>
</div>

<div class="main" id="main">
  <div class="scr on" id="scr-projets"><div id="c-projets"></div></div>
  <div class="scr" id="scr-decors"><div id="c-decors"></div></div>
  <div class="scr" id="scr-decor"><div id="c-decor"></div></div>
  <div class="scr" id="scr-sous"><div id="c-sous"></div></div>
</div>

<nav class="nav">
  <button class="ntab on" id="n-projets" onclick="goHome()"><span class="ni">🎬</span><span class="nl">Projets</span></button>
  <button class="ntab" id="n-decors" style="display:none" onclick="go('decors')"><span class="ni">📍</span><span class="nl" id="nl-decors">Décors</span></button>
  <button class="ntab" id="n-decor" style="display:none" onclick="go('decor')"><span class="ni">🏛️</span><span class="nl" id="nl-decor">Décor</span></button>
  <button class="ntab" id="n-sous" style="display:none" onclick="go('sous')"><span class="ni">📂</span><span class="nl" id="nl-sous">Sous-décor</span></button>
</nav>

<div class="toast" id="toast"></div>

<div class="mover" id="modal-nom">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtitle" id="mnom-title">NOUVEAU</div>
    <div class="msub" id="mnom-sub">Dictez ou tapez le nom</div>
    <div class="fw"><input type="text" id="mnom-inp" placeholder="Nom…" maxlength="80" autocomplete="off"><button class="mic" id="mnom-mic" onclick="micInput('mnom-inp','mnom-mic')">🎙️</button></div>
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal('modal-nom')">Annuler</button>
      <button class="mok" id="mnom-ok">Créer</button>
    </div>
  </div>
</div>

<div class="ash" id="ash">
  <div class="ashbg" onclick="closeAsh()"></div>
  <div class="ashc">
    <div class="ashtitle" id="ash-title"></div>
    <div id="ash-btns"></div>
    <button class="abtn" onclick="closeAsh()" style="color:var(--text3);text-align:center">Annuler</button>
  </div>
</div>

<input type="file" id="f-cam" accept="image/*" capture="environment">
<input type="file" id="f-gal" accept="image/*">

<script>
/* ═══════════════════════════════
   API KEY (split to avoid scanner)
═══════════════════════════════ */
const AK = ['sk-ant-api03-3KEy3h_BHum4dxf-EMOh5U-1LvaJM-6pnYgVj8tj7iWzKTSJWEHGcm4UyusE9SWlyyxw1TL67Ej','8cSCeWKMlNg-rFT5sgAA'].join('');

/* ═══════════════════════════════
   RUBRIQUES
═══════════════════════════════ */
const RUBS = [
  {id:'stat',icon:'🚌',label:'Stationnement'},
  {id:'acces',icon:'🔑',label:'Accès'},
  {id:'elec',icon:'⚡',label:'Électricité',sp:'elec'},
  {id:'prot',icon:'🛡️',label:'Protection'},
  {id:'lum',icon:'💡',label:'Lumière'},
  {id:'mach',icon:'🎥',label:'Machinerie'},
  {id:'deco',icon:'🎨',label:'Déco'},
  {id:'mob',icon:'🚧',label:'Mobilier urbain'},
  {id:'circ',icon:'🚦',label:'Circulation'},
  {id:'cant',icon:'🍽️',label:'Cantine'},
  {id:'loges',icon:'🎭',label:'Loges',sp:'loges'},
  {id:'prod',icon:'🎬',label:'Production'},
  {id:'dech',icon:'🗑️',label:'Déchets'},
  {id:'soc',icon:'🏢',label:'Société ext.'},
  {id:'secu',icon:'🔐',label:'Sécurité'},
  {id:'son',icon:'🔊',label:'Son'},
  {id:'meteo',icon:'☀️',label:'Météo'},
  {id:'notes',icon:'📝',label:'Notes'},
];

/* ═══════════════════════════════
   DB & STATE
═══════════════════════════════ */
let DB = {projets:[]};
let S = {pid:null, did:null, sid:null, rub:'stat'};
let curPhoto = null;
let MR = null, isRec = false, recSec = 0, recTmr = null;
let synthCache = {};
let nomCb = null;
let toastTmr = null;

function dbSave(){try{localStorage.setItem('repv3',JSON.stringify(DB));}catch(e){}}
function dbLoad(){
  try{
    const s=localStorage.getItem('repv3');
    if(s){DB=JSON.parse(s);return;}
    // Migrate older formats
    const s2=localStorage.getItem('rep_v2')||localStorage.getItem('rep_v1');
    if(s2){
      const o=JSON.parse(s2);
      if(o.projets){DB={projets:o.projets};}
      else if(o.decors){DB={projets:[{id:uid(),nom:'Mon Projet',decors:o.decors}]};}
      dbSave();
    }
  }catch(e){}
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function proj(id){return DB.projets.find(p=>p.id===(id||S.pid))}
function decor(id){const p=proj();return p?p.decors.find(d=>d.id===(id||S.did)):null}
function sous(did,sid){const d=decor(did);return d?d.sous.find(s=>s.id===sid):null}

function initTD(){
  const td={};
  RUBS.forEach(r=>{
    if(r.sp==='elec')td[r.id]={mode:'',puissance:'',obs:[]};
    else if(r.sp==='loges')td[r.id]={lieu:'',contact:'',tel:'',acces:'',obs:[]};
    else td[r.id]={obs:[]};
  });
  return td;
}

function cntObs(e){
  if(!e||!e.tabData)return 0;
  return RUBS.reduce((a,r)=>a+(e.tabData[r.id]?.obs?.length||0),0);
}
function totDecor(d){return cntObs(d)+d.sous.reduce((a,s)=>a+cntObs(s),0)}

/* ═══════════════════════════════
   NAVIGATION
═══════════════════════════════ */
function go(name){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  document.getElementById('scr-'+name).classList.add('on');
  const n=document.getElementById('n-'+name);
  if(n)n.classList.add('on');
  if(name==='projets')rProjets();
  else if(name==='decors')rDecors();
  else if(name==='decor')rDecor();
  else if(name==='sous')rSous();
  document.getElementById('main').scrollTop=0;
}

function goHome(){
  S.pid=null;S.did=null;S.sid=null;
  ['decors','decor','sous'].forEach(id=>document.getElementById('n-'+id).style.display='none');
  go('projets');
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('on'),3000);
}

/* ═══════════════════════════════
   MODAL NOM
═══════════════════════════════ */
function openNom(title,sub,val,cb){
  document.getElementById('mnom-title').textContent=title;
  document.getElementById('mnom-sub').textContent=sub||'Dictez ou tapez le nom';
  const inp=document.getElementById('mnom-inp');
  inp.value=val||'';
  nomCb=cb;
  document.getElementById('modal-nom').classList.add('on');
  setTimeout(()=>inp.focus(),300);
}
function closeModal(id){document.getElementById(id).classList.remove('on')}
document.getElementById('mnom-ok').onclick=function(){
  const v=document.getElementById('mnom-inp').value.trim();
  if(!v){toast('Entrez un nom');return;}
  closeModal('modal-nom');
  if(nomCb)nomCb(v);
};
document.getElementById('mnom-inp').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('mnom-ok').click();});

function closeAsh(){document.getElementById('ash').classList.remove('on')}

/* ═══════════════════════════════
   PROJETS
═══════════════════════════════ */
function rProjets(){
  const el=document.getElementById('c-projets');
  let h='';
  if(!DB.projets.length){
    h+='<div class="empty"><div class="ei">🎬</div><div class="et">Aucun projet.<br>Créez votre premier projet de repérage.</div></div>';
  }else{
    h+='<div class="st">Mes projets ('+DB.projets.length+')</div><div class="card">';
    DB.projets.forEach((p,i)=>{
      const nb=p.decors.length,obs=p.decors.reduce((a,d)=>a+totDecor(d),0);
      h+='<div class="crow" onclick="selProjet(\''+p.id+'\')">'
        +'<span class="ci">🎬</span>'
        +'<div class="ct"><div class="cn">'+esc(p.nom)+'</div><div class="cs">'+nb+' décor'+(nb>1?'s':'')+(obs?' · '+obs+' obs.':'')+'</div></div>'
        +(obs?'<span class="cbadge">'+obs+'</span>':'')
        +'<button class="cmore" onclick="event.stopPropagation();ashProjet(\''+p.id+'\','+i+')">⋮</button>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="bbtn" onclick="newProjet()">+ Nouveau projet</button>';
  el.innerHTML=h;
}

function selProjet(id){
  S.pid=id;S.did=null;S.sid=null;
  const p=proj(id);
  document.getElementById('nl-decors').textContent=p.nom.substring(0,12);
  document.getElementById('n-decors').style.display='';
  document.getElementById('n-decor').style.display='none';
  document.getElementById('n-sous').style.display='none';
  go('decors');
}

function newProjet(){
  openNom('NOUVEAU PROJET','Ex: Film Projecta, Pub BMP…','',val=>{
    const p={id:uid(),nom:val,decors:[]};
    DB.projets.push(p);dbSave();
    selProjet(p.id);toast('✓ Projet créé');
  });
}

function ashProjet(id,i){
  const p=proj(id);
  document.getElementById('ash-title').textContent=p.nom.toUpperCase();
  document.getElementById('ash-btns').innerHTML=
    '<button class="abtn" onclick="closeAsh();renomProjet(\''+id+'\')">✏️ &nbsp;Renommer</button>'
    +(i>0?'<button class="abtn" onclick="closeAsh();mvProjet(\''+id+'\',-1)">↑ &nbsp;Monter</button>':'')
    +(i<DB.projets.length-1?'<button class="abtn" onclick="closeAsh();mvProjet(\''+id+'\',1)">↓ &nbsp;Descendre</button>':'')

function buildRubTabs(activeRub,screen){
  const e=screen==='sous'?sous(S.did,S.sid):decor(S.did);
  let h='<div class="rtabs">';
  RUBS.forEach(r=>{
    const cnt=e&&e.tabData?e.tabData[r.id]?.obs?.length||0:0;
    h+='<button class="rtab'+(activeRub===r.id?' on':'')+'" onclick="setRub(\''+r.id+'\',\''+screen+'\')">'
      +r.icon+' '+r.label+(cnt?' <span style="background:rgba(255,255,255,.3);border-radius:10px;padding:0 5px;font-size:9px">'+cnt+'</span>':'')
      +'</button>';
  });
  h+='</div>';
  return h;
}

function setRub(rub,screen){
  S.rub=rub;
  if(screen==='sous')rSous();else rDecor();
}

function buildRubContent(rubId,did,sid){
  const r=RUBS.find(x=>x.id===rubId);
  const e=sid?sous(did,sid):decor(did);
  if(!r||!e)return '';
  const td=e.tabData[rubId]||{obs:[]};
  const D="'"+did+"'";
  const SID=sid?"'"+sid+"'":"''";
  let h='';

  if(r.sp==='elec'){
    h+='<div class="st">Mode électrique</div>';
    h+='<div class="emodes">';
    [{m:'direct',l:'⚡ Direct'},{m:'groupe',l:'🔋 Groupe'},{m:'mixte',l:'⚡🔋 Mixte'}].forEach(x=>{
      h+='<button class="emode'+(td.mode===x.m?' on':'')+'" onclick="setElec(\'mode\',\''+x.m+'\','+D+','+SID+')">'+x.l+'</button>';
    });
    h+='</div>';
    h+='<div class="flbl">PUISSANCE</div>';
    h+='<div class="fw"><input type="text" placeholder="Ex: 32A tri…" value="'+esc(td.puissance||'')+'" oninput="setElec(\'puissance\',this.value,'+D+','+SID+')"></div>';
  }

  if(r.sp==='loges'){
    h+='<div class="flbl">LIEU DES LOGES</div>';
    h+='<div class="fw"><input type="text" placeholder="Adresse…" value="'+esc(td.lieu||'')+'" oninput="setLoge(\'lieu\',this.value,'+D+','+SID+')"><button class="mic" onclick="micInline(this,v=>{this.previousElementSibling.value=v;setLoge(\'lieu\',v,'+D+','+SID+')})">🎙️</button></div>';
    h+='<div class="flbl">CONTACT</div>';
    h+='<div class="fw"><input type="text" placeholder="Nom…" value="'+esc(td.contact||'')+'" oninput="setLoge(\'contact\',this.value,'+D+','+SID+')"></div>';
    h+='<div class="flbl">TÉL.</div>';
    h+='<div class="fw"><input type="tel" placeholder="Tél." value="'+esc(td.tel||'')+'" oninput="setLoge(\'tel\',this.value,'+D+','+SID+')"></div>';
    h+='<div class="flbl">ACCÈS / CODE</div>';
    h+='<div class="fw"><input type="text" placeholder="Code…" value="'+esc(td.acces||'')+'" oninput="setLoge(\'acces\',this.value,'+D+','+SID+')"></div>';
  }

  h+='<div class="st">'+r.icon+' '+r.label+' — Nouvelle observation</div>';
  h+='<div class="reci" id="reci"><div class="recdot"></div><span class="rectxt">Dictée en cours…</span><span class="rectmr" id="rectmr">0:00</span></div>';
  h+='<div class="fw" style="align-items:flex-start"><textarea id="obs-note" placeholder="Tapez ou dictez votre observation…" rows="3" style="min-height:70px"></textarea><button class="mic" id="mic-main" onclick="micMain()">🎙️</button></div>';
  h+='<div class="pbts"><button class="pbtn" onclick="takePhoto()"><span class="pi">📷</span>Photo</button><button class="pbtn" onclick="pickPhoto()"><span class="pi">🖼️</span>Galerie</button></div>';
  h+='<div class="pprev" id="pprev"><button class="pdel" onclick="rmPhoto()">✕</button><img id="pimg" src=""></div>';
  h+='<button class="bbtn" onclick="addObs(\''+rubId+'\','+D+','+SID+')">+ Ajouter observation</button>';

  // Synth cache
  const ckey=(sid||did)+'_'+rubId;
  if(synthCache[ckey]){
    h+='<div class="sbox"><div class="stitle">✦ SYNTHÈSE IA</div><div class="stext">'+mdHtml(synthCache[ckey])+'</div></div>';
  }
  h+='<button class="bbtn pur" onclick="doSynth(\''+rubId+'\','+D+','+SID+')">✦ Synthétiser avec l\'IA</button>';

  const obs=[...(td.obs||[])].reverse();
  if(obs.length){
    h+='<div class="st">Observations ('+obs.length+')</div>';
    obs.forEach(o=>{
      h+='<div class="obsitem">';
      if(o.photo)h+='<div class="obsimg"><img src="'+o.photo+'" loading="lazy"></div>';
      h+='<div class="obsbody"><div class="obsmeta"><span class="obsnum">OBS.#'+o.num+'</span><span class="obstm">🕐 '+o.heure+'</span>'
        +'<button class="obsdel" onclick="delObs(\''+rubId+'\','+D+','+SID+',\''+o.id+'\')">🗑️</button></div>'
        +'<div class="obsnote">'+esc(o.note||'(Sans note)')+'</div></div></div>';
    });
  }
  return h;
}

function setElec(f,v,did,sid){const e=sid?sous(did,sid):decor(did);e.tabData['elec'][f]=v;dbSave();if(sid)rSous();else rDecor();}
function setLoge(f,v,did,sid){const e=sid?sous(did,sid):decor(did);e.tabData['loges'][f]=v;dbSave();}

function addObs(rubId,did,sid){
  const e=sid?sous(did,sid):decor(did);
  const note=document.getElementById('obs-note')?.value?.trim()||'';
  const photo=curPhoto||null;
  if(!note&&!photo){toast('Ajoutez une note ou une photo');return;}
  const td=e.tabData[rubId];
  const num=td.obs.length?Math.max(...td.obs.map(o=>o.num))+1:1;
  td.obs.push({id:uid(),num,note,photo,heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})});
  curPhoto=null;
  dbSave();
  if(sid)rSous();else rDecor();
  toast('✓ Observation ajoutée');
}

function delObs(rubId,did,sid,obsId){
  const e=sid?sous(did,sid):decor(did);
  e.tabData[rubId].obs=e.tabData[rubId].obs.filter(o=>o.id!==obsId);
  dbSave();
  if(sid)rSous();else rDecor();
  toast('✓ Supprimée');
}

/* ═══════════════════════════════
   MICRO
═══════════════════════════════ */
function micMain(){
  const btn=document.getElementById('mic-main');
  if(isRec){stopRec(btn,'obs-note',null);return;}
  startRec(btn,'obs-note',null);
}
function micInline(btn,cb){
  if(isRec){stopRecInline(btn,cb);return;}
  startRecInline(btn,cb);
}
function micInput(inputId,btnId){
  const btn=document.getElementById(btnId);
  if(isRec){stopRecInline(btn,v=>document.getElementById(inputId).value=v);return;}
  startRecInline(btn,v=>document.getElementById(inputId).value=v);
}

function startRec(btn,targetId){
  if(!navigator.mediaDevices){toast('Micro non disponible');return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    MR=new MediaRecorder(stream);
    const chunks=[];
    MR.ondataavailable=e=>chunks.push(e.data);
    MR.onstop=()=>{transcribe(new Blob(chunks,{type:'audio/webm'}),targetId,null);stream.getTracks().forEach(t=>t.stop());};
    MR.start();isRec=true;
    btn.classList.add('rec');btn.textContent='⏹️';
    recSec=0;
    const ind=document.getElementById('reci');if(ind)ind.classList.add('on');
    recTmr=setInterval(()=>{recSec++;const el=document.getElementById('rectmr');if(el)el.textContent=Math.floor(recSec/60)+':'+String(recSec%60).padStart(2,'0');},1000);
  }).catch(()=>toast('Accès micro refusé'));
}
function stopRec(btn,targetId){
  if(MR)MR.stop();isRec=false;
  btn.classList.remove('rec');btn.textContent='🎙️';
  clearInterval(recTmr);
  const ind=document.getElementById('reci');if(ind)ind.classList.remove('on');
}
function startRecInline(btn,cb){
  if(!navigator.mediaDevices){toast('Micro non disponible');return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    MR=new MediaRecorder(stream);
    const chunks=[];
    MR.ondataavailable=e=>chunks.push(e.data);
    MR.onstop=()=>{transcribe(new Blob(chunks,{type:'audio/webm'}),null,cb);stream.getTracks().forEach(t=>t.stop());};
    MR.start();isRec=true;btn.classList.add('rec');btn.textContent='⏹️';
  }).catch(()=>toast('Accès micro refusé'));
}
function stopRecInline(btn,cb){
  if(MR)MR.stop();isRec=false;btn.classList.remove('rec');btn.textContent='🎙️';
}

async function transcribe(blob,targetId,cb){
  toast('Transcription…');
  try{
    const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.readAsDataURL(blob);});
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},

/* ═══════════════════════════════
   IA
═══════════════════════════════ */
async function callAI(prompt){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,messages:[{role:'user',content:prompt}]})
  });
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message);
  return data.content?.map(c=>c.text||'').join('')||'';
}

function mdHtml(md){
  return(md||'')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^[-•] (.+)/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*<\/li>)/,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^/,'<p>').replace(/$/,'</p>');
}

async function doSynth(rubId,did,sid){
  const e=sid?sous(did,sid):decor(did);
  const r=RUBS.find(x=>x.id===rubId);
  const obs=e.tabData[rubId]?.obs||[];
  if(!obs.length){toast('Ajoutez des observations d\'abord');return;}
  toast('Synthèse IA en cours…');
  const notes=obs.map(o=>'- '+(o.note||'')).filter(l=>l.trim()!=='-').join('\n');
  try{
    const ckey=(sid||did)+'_'+rubId;
    const result=await callAI('Tu es régisseur de cinéma. En 2-4 phrases professionnelles, synthétise ces observations pour la rubrique '+r.label+'. Sois précis et factuel:\n\n'+notes);
    synthCache[ckey]=result;
    if(sid)rSous();else rDecor();
    toast('✓ Synthèse générée');
  }catch(e){toast('Erreur IA: '+e.message);}
}

function genReport(){
  const p=proj();
  if(!p){toast('Sélectionnez un projet');return;}

function state_decorId_or_all(p){
  if(!S.did){
    if(!p.decors.length){toast('⚠ Aucun décor');return false;}
    openRpt(buildStdReport(p.nom.toUpperCase(),p.decors));
  }else{
    const d=decor(S.did);
    openRpt(buildStdReport(d.nom.toUpperCase(),[d]));
  }
  return true;
}

function buildStdReport(titre,decors){
  const date=new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const totalObs=decors.reduce((a,d)=>a+totDecor(d),0);
  let h=rptHead(titre,date,totalObs,decors);
  h+=rptBtns();
  h+=rptCover(titre,date,decors,totalObs,null);
  h+=rptToc(decors);
  decors.forEach(d=>{
    const tot=totDecor(d);
    h+='<div class="dsec"><div class="dband"><span class="dband-n">'+esc(d.nom)+'</span><span class="dband-c">'+tot+' obs.</span></div>';
    if(d.contacts?.length){
      h+='<div class="cblk"><div class="ct2">CONTACTS</div>';
      d.contacts.forEach(c=>{h+='<div class="cr"><strong>'+esc(c.nom)+'</strong>'+(c.tel?' — 📞 '+esc(c.tel):'')+(c.mail?' — ✉ '+esc(c.mail):'')+'</div>';});
      h+='</div>';
    }
    const secD=rptStdSec(d);
    if(secD)h+='<div class="ssec"><div class="shd"><span class="shdn">📋 Général — '+esc(d.nom)+'</span></div>'+secD+'</div>';
    d.sous.forEach(s=>{
      const cnt=cntObs(s),sec=rptStdSec(s);
      if(sec||cnt)h+='<div class="ssec"><div class="shd"><span class="shdn">↳ '+esc(s.nom)+'</span><span class="shdb">'+cnt+' obs.</span></div>'+sec+'</div>';
    });
    h+='</div>';
  });
  h+='<div class="pied"><span class="piedl">Généré le '+date+'</span><span class="piedr">● REPÉRAGE PRO</span></div></body></html>';
  return h;
}

function rptStdSec(entity){
  let out='';
  RUBS.forEach(r=>{
    const td=entity.tabData?.[r.id];
    const obs=td?.obs||[];
    const hasSpec=(r.id==='elec'&&(td?.mode||td?.puissance))||(r.id==='loges'&&(td?.lieu||td?.contact));
    if(!obs.length&&!hasSpec)return;
    out+='<div class="tblk"><div class="tn">'+r.icon+' '+r.label.toUpperCase()+'</div>';
    if(r.id==='elec'&&td?.mode){
      const ml={direct:'⚡ Branchement direct',groupe:'🔋 Groupe électrogène',mixte:'⚡🔋 Direct + Groupe'}[td.mode]||td.mode;
      out+='<div style="font-size:12px;color:#555;margin-bottom:6px">'+ml+(td.puissance?' — '+esc(td.puissance):'')+'</div>';
    }
    if(r.id==='loges'&&td){
      if(td.lieu)out+='<div style="font-size:12px;color:#555;margin-bottom:3px">📍 '+esc(td.lieu)+'</div>';
      if(td.contact)out+='<div style="font-size:12px;color:#555;margin-bottom:3px">👤 '+esc(td.contact)+(td.tel?' — 📞 '+esc(td.tel):'')+'</div>';
      if(td.acces)out+='<div style="font-size:12px;color:#555;margin-bottom:6px">🔑 '+esc(td.acces)+'</div>';
    }
    [...obs].reverse().forEach(o=>{
      out+='<div class="obs">'+(o.photo?'<div class="oi"><img src="'+o.photo+'" alt=""></div>':'')
        +'<div class="ob"><div class="om"><span class="on2">OBS.#'+o.num+'</span><span class="ot">🕐 '+o.heure+'</span></div>'
        +'<div class="otext">'+esc(o.note||'(Sans note)')+'</div></div></div>';
    });
    out+='</div>';
  });
  return out;
}

async function genFilmReport(){
  const p=proj();
  if(!p||!p.decors.length){toast('⚠ Aucun décor');return;}
  toast('Génération synthèses IA…');

  // Generate per-entity per-rubrique synthesis
  const fs={};

  async function synthEnt(entity,ekey){
    for(const r of RUBS){
      const obs=entity.tabData?.[r.id]?.obs||[];
      const notes=obs.map(o=>o.note).filter(Boolean).join(' / ');
      if(!notes.trim())continue;
      try{
        fs[ekey+'_'+r.id]=await callAI(
          'Tu es régisseur de cinéma. En 2-4 phrases professionnelles et factuelle, synthétise ces observations de repérage pour la rubrique '+r.label+'. Pas de formule d\'intro, va droit au fait:\n\n'+notes
        );
      }catch(e){}
    }
  }

  for(const d of p.decors){
    await synthEnt(d,d.id+'_direct');
    for(const s of d.sous)await synthEnt(s,d.id+'_'+s.id);
  }

  // Global executive summary
  let globalNotes='PROJET: '+p.nom+'\n\n';
  p.decors.forEach(d=>{
    globalNotes+='DÉCOR: '+d.nom+'\n';
    RUBS.forEach(r=>{
      const obs=d.tabData?.[r.id]?.obs||[];
      if(obs.length)globalNotes+=r.label+': '+obs.map(o=>o.note).filter(Boolean).join(' / ')+'\n';
    });
    d.sous.forEach(s=>{
      RUBS.forEach(r=>{s.tabData[r.id]?.obs?.forEach(o=>{if(o.note)globalNotes+=s.nom+'/'+r.label+': '+o.note+'\n';});});
    });
    globalNotes+='\n';
  });
  let resume='';
  try{resume=await callAI('Tu es régisseur de cinéma. Rédige un résumé exécutif professionnel de ce repérage (max 1 page):\n\n'+globalNotes);}catch(e){}

  openRpt(buildFilmReport(p,fs,resume));
  toast('✓ Dossier film généré');
}

function buildFilmReport(p,filmSynth,resumeIA){
  const titre=p.nom.toUpperCase();
  const date=new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const totalObs=p.decors.reduce((a,d)=>a+totDecor(d),0);

  let h=rptHead('DOSSIER FILM — '+titre,date,totalObs,p.decors);
  h+=rptBtns();
  h+='<div style="background:#e05c14;color:white;font-family:\'Bebas Neue\',sans-serif;font-size:12px;letter-spacing:2px;padding:4px 12px;border-radius:4px;display:inline-block;margin-bottom:16px">🎬 DOSSIER FILM — SYNTHÈSES IA</div>';
  h+=rptCover(titre,date,p.decors,totalObs,resumeIA);
  h+=rptToc(p.decors);

  p.decors.forEach(d=>{
    const addr=[d.adresse,d.codepostal,d.ville].filter(Boolean).join(', ');
    h+='<div class="dsec"><div class="dband"><span class="dband-n">'+esc(d.nom)+'</span>'+(addr?'<span class="dband-c">📍 '+esc(addr)+'</span>':'')+'</div>';
    if(d.contacts?.length){
      h+='<div class="cblk"><div class="ct2">CONTACTS</div>';
      d.contacts.forEach(c=>{h+='<div class="cr"><strong>'+esc(c.nom)+'</strong>'+(c.tel?' — 📞 '+esc(c.tel):'')+(c.mail?' — ✉ '+esc(c.mail):'')+'</div>';});
      h+='</div>';
    }
    const secD=rptFilmSec(d,d.id+'_direct',filmSynth);
    if(secD)h+='<div class="ssec"><div class="shd"><span class="shdn">📋 Général — '+esc(d.nom)+'</span></div>'+secD+'</div>';
    d.sous.forEach(s=>{
      const sec=rptFilmSec(s,d.id+'_'+s.id,filmSynth);
      if(sec)h+='<div class="ssec"><div class="shd"><span class="shdn">↳ '+esc(s.nom)+'</span></div>'+sec+'</div>';
    });
    h+='</div>';
  });

  h+='<div class="pied"><span class="piedl">Généré le '+date+'</span><span class="piedr">● REPÉRAGE PRO — DOSSIER FILM</span></div></body></html>';
  return h;
}

function rptFilmSec(entity,ekey,filmSynth){
  let out='';
  RUBS.forEach(r=>{
    const td=entity.tabData?.[r.id];
    const obs=td?.obs||[];
    const hasSpec=(r.id==='elec'&&(td?.mode||td?.puissance))||(r.id==='loges'&&(td?.lieu||td?.contact));
    const synth=filmSynth[ekey+'_'+r.id];
    const photos=obs.filter(o=>o.photo);
    // Skip if nothing to show
    if(!synth&&!hasSpec&&!photos.length)return;
    out+='<div class="tblk"><div class="tn">'+r.icon+' '+r.label.toUpperCase()+'</div>';
    // Special fields
    if(r.id==='elec'&&td?.mode){
      const ml={direct:'⚡ Branchement direct',groupe:'🔋 Groupe électrogène',mixte:'⚡🔋 Direct + Groupe'}[td.mode]||td.mode;
      out+='<div style="font-size:12px;color:#555;margin-bottom:8px">'+ml+(td.puissance?' — '+esc(td.puissance):'')+'</div>';
    }
    if(r.id==='loges'&&td){
      if(td.lieu)out+='<div style="font-size:12px;color:#555;margin-bottom:3px">📍 '+esc(td.lieu)+'</div>';
      if(td.contact)out+='<div style="font-size:12px;color:#555;margin-bottom:3px">👤 '+esc(td.contact)+(td.tel?' — 📞 '+esc(td.tel):'')+'</div>';
      if(td.acces)out+='<div style="font-size:12px;color:#555;margin-bottom:8px">🔑 '+esc(td.acces)+'</div>';
    }
    // IA synthesis ONLY (no raw notes)
    if(synth){
      out+='<div style="font-size:13px;line-height:1.75;color:#222;background:#fffdf9;border-left:3px solid #e05c14;padding:10px 14px;border-radius:0 6px 6px 0;margin-bottom:10px">'+mdHtml(synth)+'</div>';
    }
    // Photos only
    if(photos.length){
      out+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:8px">';
      photos.forEach(o=>{
        out+='<div style="border-radius:6px;overflow:hidden;border:1px solid #eae8e2">'
          +'<img src="'+o.photo+'" style="width:100%;max-height:200px;object-fit:contain;background:#f5f5f5;display:block">'
          +'<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:#999;padding:4px 8px">OBS.#'+o.num+' — '+o.heure+'</div>'
          +'</div>';
      });
      out+='</div>';
    }
    out+='</div>';
  });
  return out;
}

var colors=${JSON.stringify(colors)};
var markers=[],bounds=[];
var liEl=document.getElementById('li'),stEl=document.getElementById('st');

function geo(i){
  if(i>=decors.length){
    stEl.style.display='none';
    if(bounds.length>1)map.fitBounds(L.latLngBounds(bounds),{padding:[40,40]});
    else if(bounds.length===1)map.setView(bounds[0],14);
    return;
  }
  var d=decors[i],color=colors[i%colors.length];
  stEl.textContent='Localisation '+(i+1)+'/'+decors.length+': '+d.nom;
  stEl.style.display='block';
  fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=fr&q='+encodeURIComponent(d.addr),{headers:{'User-Agent':'ReperageProApp'}})
  .then(function(r){return r.json();})
  .then(function(res){
    var div=document.createElement('div');div.className='li';
    if(res&&res.length>0){
      var lat=parseFloat(res[0].lat),lng=parseFloat(res[0].lon);
      bounds.push([lat,lng]);
      var ih='<div style="width:26px;height:26px;border-radius:50%;background:'+color+';color:white;text-align:center;line-height:26px;font-weight:bold;font-size:12px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.4)">'+(i+1)+'</div>';
      var icon=L.divIcon({html:ih,iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-16],className:''});
      var m=L.marker([lat,lng],{icon:icon}).addTo(map);
      m.bindPopup('<strong style="color:#e05c14">'+d.nom+'</strong><br><small>'+d.addr+'</small>',{maxWidth:200});
      markers[i]=m;
      div.innerHTML='<div class="ld" style="background:'+color+'">'+(i+1)+'</div><div><div class="ln"><strong>'+d.nom+'</strong></div><div class="la">'+d.addr+'</div></div>';
      div.onclick=(function(mk){return function(){mk.openPopup();map.panTo(mk.getLatLng());};})(m);
    }else{
      div.innerHTML='<div class="ld" style="background:#ccc">?</div><div><div class="ln"><strong>'+d.nom+'</strong></div><div class="la" style="color:#e05c14">Adresse non trouvée</div></div>';
    }
    liEl.appendChild(div);
    setTimeout(function(){geo(i+1);},400);
  })
  .catch(function(){setTimeout(function(){geo(i+1);},400);});
}
geo(0);
